/* ================================================================
   GOOGLE APPS SCRIPT BRIDGE
   Envolve google.script.run em uma Promise, com exemplos de:
   - envio de parâmetros:      callGAS('getSprData', {canal:'XPT'})
   - retorno de dados:         .then(data => ...)
   - successHandler/failureHandler nativos do Apps Script
================================================================ */
function callGAS(fnName, ...args){
  return new Promise((resolve, reject) => {
    if (typeof google === 'undefined' || !google.script || !google.script.run) {
      reject(new Error('google.script.run indisponível (fora do ambiente Apps Script).'));
      return;
    }
    google.script.run
      .withSuccessHandler((response) => {
        // Backend.gs sempre devolve { ok, data } ou { ok:false, error }
        if (response && response.ok === false) reject(new Error(response.error || 'Erro no servidor.'));
        else resolve(response && 'data' in response ? response.data : response);
      })
      .withFailureHandler((err) => reject(err))
      [fnName](...args);
  });
}

const DataService = (() => {
  const CONFIG = {
    source: 'mock', // troque para 'gas' para usar Backend.gs via google.script.run
    refreshInterval: 60,
    sheets: { gestao:'', performance:'', asm:'', conveyor:'', inbound:'', outbound:'', spr:'', tratativas:'', clusterizacao:'' },
    api: { baseUrl:'', token:'', endpoints: { gestao:'/api/gestao', performance:'/api/performance',
      asm:'/api/asm', conveyor:'/api/conveyor', inbound:'/api/inbound', outbound:'/api/outbound', spr:'/api/spr', tratativas:'/api/tratativas' } }
  };

  function parseCSV(text){
    const lines = text.trim().split('\n'); if(lines.length<2) return [];
    const headers = lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
    return lines.slice(1).map(line=>{
      const vals = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g)||[];
      const obj={}; headers.forEach((h,i)=>{ obj[h]=(vals[i]||'').replace(/"/g,'').trim(); }); return obj;
    });
  }

  async function fetchSheets(s){
    const url=CONFIG.sheets[s]; if(!url) throw new Error('URL não configurada: '+s);
    const r=await fetch(url); if(!r.ok) throw new Error('HTTP '+r.status);
    return parseCSV(await r.text());
  }

  async function fetchAPI(s){
    const {baseUrl,token,endpoints}=CONFIG.api;
    const r=await fetch(baseUrl+endpoints[s],{headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}});
    if(!r.ok) throw new Error('HTTP '+r.status); return r.json();
  }

  function fetchMock(s){
    return new Promise(res=>setTimeout(()=>res(MOCK[s]||{}), 500+Math.random()*400));
  }

  async function fetchGAS(s){
    // Exemplo: seção 'spr' busca via Backend.gs -> getSprData(filters)
    if(s==='spr') return await callGAS('getSprData', {});
    throw new Error('Seção "'+s+'" ainda não tem função em Backend.gs.');
  }

  async function load(s){
    if(CONFIG.source==='gas') return {data:await fetchGAS(s),source:'Apps Script'};
    if(CONFIG.source==='sheets'&&CONFIG.sheets[s]) return {data:await fetchSheets(s),source:'Google Sheets'};
    if(CONFIG.source==='api'&&CONFIG.api.baseUrl) return {data:await fetchAPI(s),source:'API REST'};
    return {data:await fetchMock(s),source:'Demo'};
  }

  async function saveOccurrence(payload){
    if(CONFIG.source==='gas') return await callGAS('saveOccurrence', payload);
    if(CONFIG.source==='api'&&CONFIG.api.baseUrl){
      const {baseUrl,token}=CONFIG.api;
      const r=await fetch(baseUrl+'/api/tratativas',{method:'POST',
        headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(!r.ok) throw new Error('HTTP '+r.status); return r.json();
    }
    return {...payload, id:'#OC-'+(2847+Math.floor(Math.random()*100))};
  }

  return {load, saveOccurrence, CONFIG};
})();

function greeting(){
  const h = new Date().getHours();
  if(h >= 6 && h < 12) return 'Bom dia';
  if(h >= 13 && h < 18) return 'Boa tarde';
  return 'Boa noite';
}

  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));

      backlog:renderBacklog,
      conveyor:renderConveyor, inbound:renderInbound, outbound:renderOutbound, spr:renderSPR, tratativas:renderTratativas,

      scorecard:renderScorecard, absenteismo:renderAbsenteismo,
      configuracoes:renderConfiguracoes, forecast:renderForecast,
      auditoria:renderAuditoria, clusterizacao:renderClusterizacao,
      matriz:renderMatriz, mapadados:renderMapaDados, jornal:renderJornal};
    if(fn[section]) fn[section](data);

  } catch(err){

const chartInstances={};
function destroyCharts(){
  // Full destroy — used on logout/reset
  Object.keys(chartInstances).forEach(k=>{chartInstances[k]?.destroy();delete chartInstances[k];});
}

function themeVar(name, fallback){
  const v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  return v || fallback;
}
function chartPalette(){
  return [1,2,3,4,5,6,7,8].map(i => themeVar('--chart-'+i, '#8890b0'));
}

function cd(){
  const grid=themeVar('--grid','rgba(255,255,255,.05)'), tick=themeVar('--text-muted','#5c5f7a');
  return {
    grid, tick,
    plugins:{
      legend:{labels:{color:tick,boxWidth:11,font:{size:11}}},
      tooltip:{backgroundColor:'#2a2d42',titleColor:'#e8eaf0',bodyColor:tick,
        borderColor:'rgba(255,255,255,.08)',borderWidth:1,padding:10,cornerRadius:8},
    },
    scales:{
      x:{ticks:{color:tick,font:{size:10}},grid:{color:grid}},
      y:{ticks:{color:tick,font:{size:10}},grid:{color:grid}},
    }
  };
}

function mkChart(id,type,data,opts={}){
  const c=document.getElementById(id); if(!c) return;
  const d=cd();
  chartInstances[id]=new Chart(c,{type,data,options:{
    responsive:true,maintainAspectRatio:false,
    plugins:d.plugins,scales:d.scales,...opts,
    animation:{ onComplete(){ drawAllLabels(chartInstances[id]); } }
  }});
}

/* ── Universal numeric label drawer — line, bar, pie, doughnut ── */
function fmtVal(val){
  if(val==null||val===undefined) return null;
  if(typeof val!=='number') return String(val);
  if(val===0) return '0';
  return val>=10000 ? (val/1000).toFixed(0)+'k'
       : val>=1000  ? (val/1000).toFixed(1)+'k'
       : val%1===0  ? String(val)
       : val.toFixed(1);
}

function drawAllLabels(chart){
  if(!chart||!chart.ctx) return;
  const ctx=chart.ctx;
  const type=chart.config.type;
  ctx.save();

  if(type==='line'){
    chart.data.datasets.forEach((ds,di)=>{
      const meta=chart.getDatasetMeta(di);
      meta.data.forEach((pt,i)=>{
        const label=fmtVal(ds.data[i]); if(!label) return;
        ctx.font='bold 9px Inter,sans-serif';
        ctx.fillStyle=ds.borderColor||'#fff';
        ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText(label, pt.x, pt.y-7);
      });
    });

  } else if(type==='bar'){
    chart.data.datasets.forEach((ds,di)=>{
      const meta=chart.getDatasetMeta(di);
      meta.data.forEach((bar,i)=>{
        const label=fmtVal(ds.data[i]); if(!label||label==='0') return;
        const {x,y,base,width}=bar.getProps(['x','y','base','width'],true);
        const barH=Math.abs(base-y);
        ctx.font='bold 9px Inter,sans-serif';
        ctx.textAlign='center';
        if(barH>16){
          // inside bar, near top
          ctx.fillStyle='rgba(255,255,255,.9)';
          ctx.textBaseline='top';
          ctx.fillText(label, x, y+4);
        } else {
          // above bar
          ctx.fillStyle=ds.backgroundColor||'#fff';
          ctx.textBaseline='bottom';
          ctx.fillText(label, x, y-3);
        }
      });
    });

  } else if(type==='pie'||type==='doughnut'){
    chart.data.datasets.forEach((ds,di)=>{
      const meta=chart.getDatasetMeta(di);
      const total=ds.data.reduce((a,b)=>a+(b||0),0);
      meta.data.forEach((arc,i)=>{
        const val=ds.data[i]; if(!val||val===0) return;
        const pct=Math.round(val/total*100);
        if(pct<4) return; // skip tiny slices
        const angle=(arc.startAngle+arc.endAngle)/2;
        const r=(arc.outerRadius+(type==='doughnut'?arc.innerRadius:0))/2;
        const x=arc.x+Math.cos(angle)*r*(type==='doughnut'?1:0.65);
        const y=arc.y+Math.sin(angle)*r*(type==='doughnut'?1:0.65);
        ctx.font='bold 10px Inter,sans-serif';
        ctx.fillStyle='#fff';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(pct+'%', x, y);
      });
    });
  }

  ctx.restore();
}

/* Draw line labels (kept for BKL manual charts) */
function drawLineLabels(chart){ drawAllLabels(chart); }

/* ================================================================
   SPR — Linehaul (Cubagem · SPR · Canal · Aderência · Cancelamentos)
================================================================ */
function renderSPR(data){
  const rows = (data && data.length) ? data : MOCK.spr;
  const canalFilter = document.getElementById('spr-filter-canal')?.value || '';
  const turnoFilter = document.getElementById('spr-filter-turno')?.value || '';

  window.SPR_ROWS = rows.filter(r =>
    (!canalFilter || r.canal === canalFilter) &&
    (!turnoFilter || r.turno_cpt === turnoFilter)
  );

  const closed = window.SPR_ROWS.filter(r => r.status_agrupado === 'FECHADA');
  const cancelled = window.SPR_ROWS.filter(r => r.status_agrupado === 'CANCELADO');

  const totalOrders = closed.reduce((a,r) => a + (r.sum_orders || 0), 0);
  const sprMedio = closed.length ? (totalOrders / closed.length).toFixed(1) : '0';
  const onTime = closed.filter(r => r.status_cpt === 'ON TIME').length;
  const aderenciaPct = closed.length ? Math.round(onTime / closed.length * 100) : 0;
  const pctCancel = window.SPR_ROWS.length ? Math.round(cancelled.length / window.SPR_ROWS.length * 100) : 0;

  buildKPIs('spr-kpis', [
    {label:'Viagens (Fechadas)', value:closed.length, delta:cancelled.length+' canceladas', trend:'up', type:'', icon:'fa-truck'},
    {label:'SPR Médio', value:sprMedio, delta:'pedidos / viagem', trend:'up', type:'success', icon:'fa-box'},
    {label:'Aderência ao Scheduled', value:aderenciaPct+'%', delta:onTime+' on time de '+closed.length, trend: aderenciaPct>=90?'up':'down', type: aderenciaPct>=90?'success':'warning', icon:'fa-clock'},
    {label:'% Cancelamento', value:pctCancel+'%', delta:cancelled.length+' viagens', trend:'down', type: pctCancel>10?'danger':'', icon:'fa-ban'},
    {label:'Cubagem do Veículo', value:'Indisponível', delta:'requer tabela de capacidade (m³) por tipo de veículo', trend:'down', type:'warning', icon:'fa-cube'},
  ]);

  const turnos=['T1','T2','T3'];
  const sprPorTurno = turnos.map(t=>{
    const rs = closed.filter(r=>r.turno_cpt===t);
    const tot = rs.reduce((a,r)=>a+(r.sum_orders||0),0);
    return rs.length ? +(tot/rs.length).toFixed(1) : 0;
  });
  const palette = chartPalette();
  mkBar('chart-spr-turno', turnos, [{label:'SPR', data:sprPorTurno, backgroundColor:palette[4], borderRadius:6}]);

  const horas = Array.from({length:24},(_,i)=>i);
  const carrosPorHora = horas.map(h => window.SPR_ROWS.filter(r=>r.hora_cpt===h).length);
  mkBar('chart-spr-hora', horas.map(h=>String(h).padStart(2,'0')+'h'),
    [{label:'Viagens', data:carrosPorHora, backgroundColor:palette[7], borderRadius:4}]);

function genClusterData(){
  // 142 ruas distribuídas entre 17 docas (~8 ruas/doca em média)
  const TOTAL_RUAS = 142;
  const TOTAL_DOCAS = 17;
  const docas = [];
  let ruaCounter = 1;
  let cidadeIdx = 0;

  // Distribui 142 ruas entre 17 docas o mais uniformemente possível
  const base = Math.floor(TOTAL_RUAS / TOTAL_DOCAS);
  const resto = TOTAL_RUAS % TOTAL_DOCAS;
  const ruasPerDoca = Array.from({length:TOTAL_DOCAS}, (_,i) => base + (i < resto ? 1 : 0));

  for(let d = 1; d <= TOTAL_DOCAS; d++){
    const numRuas = ruasPerDoca[d-1];
    const ruas = [];
    for(let r = 0; r < numRuas; r++){
      const ruaNum = String(ruaCounter).padStart(3,'0');
      ruaCounter++;
      const isEmpty = Math.random() < 0.12; // ~12% completely empty
      const occPct = isEmpty ? 0 : Math.floor(Math.random()*95)+5;
      const cap = [10,15,20,22][Math.floor(Math.random()*4)];
      const occCount = Math.round(cap * occPct/100);

      ruas.push({
        rua: 'RUA ' + ruaNum,
        spp: isEmpty ? null : Math.floor(Math.random()*450)+100,
        saca: isEmpty ? null : (Math.random()<0.5 ? Math.floor(Math.random()*120)+10 : null),
        scuttle: isEmpty ? null : (Math.random()<0.3 ? Math.floor(Math.random()*15)+1 : null),
        posOcc: occCount,
        posCap: cap,
        aging: isEmpty ? null : +(Math.random()*18+1).toFixed(1),
        pacotesOvr: isEmpty ? null : Math.floor(Math.random()*6000)+300,
        proxCpt: isEmpty ? null : `${String(Math.floor(Math.random()*14)+10).padStart(2,'0')}:${['00','15','30','45'][Math.floor(Math.random()*4)]}`,
        timerCpt: isEmpty ? null : `${String(Math.floor(Math.random()*5)).padStart(2,'0')}:${String(Math.floor(Math.random()*59)).padStart(2,'0')}`,
        ocupacao: occPct,
        posicoesPend: Math.floor(Math.random()*7),
        cidade: isEmpty ? null : CIDADES_DEMO[cidadeIdx % CIDADES_DEMO.length],
        clusterIdeal: isEmpty ? null : (Math.random() < 0.6
          ? CIDADES_DEMO[cidadeIdx % CIDADES_DEMO.length]
          : CIDADES_DEMO[(cidadeIdx + Math.floor(Math.random()*3)+1) % CIDADES_DEMO.length]),
      });
      if(!isEmpty) cidadeIdx++;
    }
    docas.push({ id: 'DOCA ' + String(d).padStart(3,'0'), ruas });
  }
  return docas;
}

function buildClusterSummary(docas){
  const allRuas = docas.flatMap(d => d.ruas);
  const ocupadas = allRuas.filter(r => r.posOcc > 0).length;
  const livres = allRuas.length - ocupadas;
  const totalPacotes = allRuas.reduce((s,r)=>s+(r.pacotesOvr||0),0);
  const agingVals = allRuas.filter(r=>r.aging!=null).map(r=>r.aging);
  const agingMedio = agingVals.length ? (agingVals.reduce((a,b)=>a+b,0)/agingVals.length).toFixed(1) : '0.0';
  const pendEnd = allRuas.reduce((s,r)=>s+(r.posicoesPend||0),0);
  const posOcupadas = allRuas.reduce((s,r)=>s+r.posOcc,0);
  const posDisponiveis = allRuas.reduce((s,r)=>s+(r.posCap-r.posOcc),0);
  const ruasOk = allRuas.filter(r => !r.cidade || r.cidade === r.clusterIdeal).length;
  const ruasNok = allRuas.length - ruasOk;
  const pctClusterizacao = ((ruasOk/allRuas.length)*100).toFixed(1);

  const now = new Date();
  const atualizacao = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

  const items = [
    { label:'Atualização', value:atualizacao, cls:'' },
    { label:'% Clusterização', value:pctClusterizacao+'%', cls: pctClusterizacao<60?'alert':'ok' },
    { label:'Total Pacotes End.', value:totalPacotes.toLocaleString('pt-BR'), cls:'accent' },
    { label:'Aging Médio', value:agingMedio, cls: agingMedio>12?'alert':'' },
    { label:'Pctos. Pendentes End.', value:pendEnd.toLocaleString('pt-BR'), cls:'' },
    { label:'Pos. Ocupadas', value:posOcupadas.toLocaleString('pt-BR'), cls:'' },
    { label:'Pos. Disponíveis', value:posDisponiveis.toLocaleString('pt-BR'), cls:'ok' },
    { label:'Ruas Ocupadas', value:ocupadas, cls:'alert' },
    { label:'Ruas Livres', value:livres, cls:'ok' },
    { label:'Ruas OK', value:ruasOk, cls:'ok' },
    { label:'Ruas NOK', value:ruasNok, cls:'alert' },
  ];

  document.getElementById('clst-summary').innerHTML = items.map(it => `
    <div class="clst-summary-item">
      <div class="clst-summary-label">${it.label}</div>
      <div class="clst-summary-value ${it.cls}">${it.value}</div>
    </div>`).join('');
}

  allRuas.forEach(r => {
    const pct = r.posCap>0 ? r.ocupacao : 0;
    const labelInside = pct >= 14; // só cabe o texto dentro se a barra tiver altura mínima

      <div style="height:200px;width:100%;background:rgba(16,185,129,.35);border-radius:3px;position:relative;overflow:hidden;display:flex;align-items:flex-end;justify-content:center">
        <div style="position:absolute;bottom:0;left:0;width:100%;height:${pct}%;background:#ef4444;transition:height .4s;display:flex;align-items:flex-start;justify-content:center">
          ${labelInside ? `<span style="font-size:9px;font-weight:700;color:#fff;margin-top:4px;text-shadow:0 1px 2px rgba(0,0,0,.4)">${pct}%</span>` : ''}
        </div>
        ${!labelInside ? `<span style="position:absolute;bottom:2px;font-size:9px;font-weight:700;color:var(--text-muted)">${pct}%</span>` : ''}
      </div>
    </td>`;
  });
  tbody += '</tr>';

  // ── POSIÇÕES PEND. END. ──
  tbody += '<tr><td class="clst-rowlabel">POSIÇÕES PEND. END.</td>';
  allRuas.forEach(r => { tbody += `<td>${r.posicoesPend}</td>`; });
  tbody += '</tr>';

  // ── FANOUT ENDEREÇADO ──
  tbody += `<tr class="clst-section-row"><td colspan="${allRuas.length+1}">FANOUT ENDEREÇADO</td></tr>`;
  tbody += '<tr><td class="clst-rowlabel" style="vertical-align:bottom">Cidade / Hub</td>';
  allRuas.forEach(r => {
    tbody += `<td style="writing-mode:vertical-rl;text-orientation:mixed;height:170px;font-size:9px;padding:6px 3px;white-space:nowrap;overflow:visible">${r.cidade||'—'}</td>`;
  });
  tbody += '</tr>';

  // ── MATCH LINE — verde se Fanout == Ideal (ou vazio), vermelho se diferente ──
  tbody += '<tr style="height:6px">';
  tbody += '<td class="clst-rowlabel" style="padding:0;font-size:0">&nbsp;</td>';
  allRuas.forEach(r => {
    const isEmpty = !r.cidade;
    const matches = isEmpty || r.cidade === r.clusterIdeal;
    const color = matches ? '#10b981' : '#ef4444';
    tbody += `<td style="padding:0;height:6px;background:${color}" title="${isEmpty?'Vazio':matches?'Fanout = Ideal':'Fanout ≠ Ideal'}"></td>`;
  });
  tbody += '</tr>';

  // ── CLUSTERIZAÇÃO IDEAL ──
  tbody += `<tr class="clst-section-row"><td colspan="${allRuas.length+1}">CLUSTERIZAÇÃO IDEAL</td></tr>`;
  tbody += '<tr><td class="clst-rowlabel" style="vertical-align:bottom">Sugestão de Cluster</td>';

    tbody += `<td style="writing-mode:vertical-rl;text-orientation:mixed;height:170px;font-size:9px;padding:6px 3px;white-space:nowrap;overflow:visible">${r.clusterIdeal}</td>`;
  });
  tbody += '</tr>';

  tbody += '</tbody>';

  document.getElementById('clst-main-table').innerHTML = thead + tbody;
}

  document.querySelectorAll('.bkl-pf-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  BKL_ACTIVE_PROFILE = profile;
  // Rebuild active panel with new filter
  const activePanel = document.querySelector('.bkl-panel.active');
  if(!activePanel) return;
  const type = activePanel.id.replace('bkl-panel-','');
  // Destroy charts and rebuild
  ['chart-bkl-'+type, 'chart-bkl-'+type+'-total'].forEach(cid => {
    if(chartInstances[cid]){ chartInstances[cid].destroy(); delete chartInstances[cid]; }
  });
  buildBklPanel(type);
}

function bklTab(id, el){
  document.querySelectorAll('.bkl-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.bkl-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('bkl-panel-'+id).classList.add('active');
  // Destroy all bkl charts then rebuild for active panel
  ['received','packed','eha'].forEach(t => {
    ['chart-bkl-'+t, 'chart-bkl-'+t+'-total'].forEach(cid => {
      if(chartInstances[cid]){ chartInstances[cid].destroy(); delete chartInstances[cid]; }
    });
  });
  buildBklChart(id);
}

function buildBklPanel(type){
  const data = BKL_DATA[type];
  const container = document.getElementById('bkl-cards-'+type);
  if(!container) return;

  // Apply profile filter
  const activeFilter = BKL_ACTIVE_PROFILE || 'all';
  const filteredProfiles = activeFilter === 'all' ? PROFILES : PROFILES.filter(p => p.key === activeFilter);

  const totalAll  = PROFILES.reduce((s,p)=>s+(data[p.key]?.total||0),0);
  const totalMeta = PROFILES.reduce((s,p)=>s+(data[p.key]?.meta||0),0);
  const totalPct  = Math.round((totalAll/Math.max(totalMeta,1))*100);
  const totalDelta = rnd(-10,15,1)[0];

  // ── Card de total (primeiro item do grid, mesma linha dos perfis) ──
  const totalCard = `
    <div class="bkl-card" style="background:linear-gradient(135deg,var(--surface) 0%,rgba(238,77,45,.06) 100%);border-color:rgba(238,77,45,.25)">
      <div class="bkl-card-label">Total Geral</div>
      <div class="bkl-card-name">Backlog ${type.charAt(0).toUpperCase()+type.slice(1)}</div>
      <div class="bkl-card-value" style="color:var(--orange)">${totalAll.toLocaleString('pt-BR')}</div>
      <div class="bkl-card-unit">todos os perfis</div>
      <div class="bkl-card-delta ${totalDelta>=0?'up':'down'}">
        <i class="fas fa-arrow-trend-${totalDelta>=0?'up':'down'}"></i>
        ${totalDelta>0?'+':''}${totalDelta}% vs hora ant.
      </div>
      <div class="bkl-card-bar-bg" style="margin-top:4px">
        <div class="bkl-card-bar-fill" style="width:${Math.min(totalPct,100)}%;background:var(--orange)"></div>
      </div>
      <div class="bkl-card-meta">
        <span>Meta: ${totalMeta.toLocaleString('pt-BR')}</span>
        <span>${totalPct}% meta</span>
      </div>
    </div>`;

  // ── Cards por perfil ──
  container.innerHTML = totalCard + filteredProfiles.map(p=>{
    const d = data[p.key];
    const pct = Math.round((d.total/Math.max(d.meta,1))*100);
    const share = Math.round((d.total/Math.max(totalAll,1))*100);
    const delta = rnd(-15,20,1)[0];
    const trend = delta>=0?'up':'down';
    return `
    <div class="bkl-card ${p.cls}">
      <div class="bkl-card-icon"><i class="fas ${p.icon}"></i></div>
      <div class="bkl-card-label">Perfil</div>
      <div class="bkl-card-name">${p.label} — ${p.name}</div>
      <div class="bkl-card-value">${d.total.toLocaleString('pt-BR')}</div>
      <div class="bkl-card-unit">pacotes em backlog</div>
      <div class="bkl-card-delta ${trend}">
        <i class="fas fa-arrow-trend-${trend}"></i>
        ${delta>0?'+':''}${delta}% vs hora anterior
      </div>
      <div class="bkl-card-bar-bg">
        <div class="bkl-card-bar-fill" style="width:${Math.min(pct,100)}%"></div>
      </div>
      <div class="bkl-card-meta">
        <span>Meta: ${d.meta.toLocaleString('pt-BR')}</span>
        <span>${share}% do total · ${pct}% da meta</span>
      </div>
    </div>`;
  }).join('');

  buildBklChart(type, filteredProfiles);
}

function buildBklChart(type, visibleProfiles){
  const data = BKL_DATA[type];
  const profs = visibleProfiles || PROFILES;
  const d = cd();

  // Shared datalabels config (inline numbers on points)
  const lineOpts = (extra={}) => ({
    responsive:true, maintainAspectRatio:false,
    plugins:{
      ...d.plugins,
      datalabels: false, // Chart.js built-in won't handle this; use custom plugin below
    },
    scales: d.scales,
    ...extra
  });

  // ── Chart 1: por perfil ──
  const cid1 = 'chart-bkl-'+type;
  if(chartInstances[cid1]){ chartInstances[cid1].destroy(); delete chartInstances[cid1]; }
  const c1 = document.getElementById(cid1); if(!c1) return;

  chartInstances[cid1] = new Chart(c1, {
    type:'line',
    data:{
      labels: BKL_HOURS,
      datasets: profs.map(p=>({
        label: `${p.label} — ${p.name}`,
        data: data[p.key].hourly,
        borderColor: PROFILE_COLORS[p.key],
        backgroundColor: PROFILE_COLORS[p.key]+'18',
        fill: false,
        tension: .4,
        pointRadius: 4,
        pointHoverRadius: 7,
        pointBackgroundColor: PROFILE_COLORS[p.key],
      }))
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        ...d.plugins,
        tooltip:{
          ...d.plugins.tooltip,
          callbacks:{
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString('pt-BR')} pkgs`
          }
        }
      },
      scales: d.scales,
      // Inline numbers on each point via afterDraw plugin
      animation:{ onComplete: () => drawLineLabels(chartInstances[cid1]) },
    }
  });

  // ── Chart 2: total (soma de todos os perfis por hora) ──
  const cid2 = 'chart-bkl-'+type+'-total';
  if(chartInstances[cid2]){ chartInstances[cid2].destroy(); delete chartInstances[cid2]; }
  const c2 = document.getElementById(cid2); if(!c2) return;

  const totalHourly = BKL_HOURS.map((_,i) => profs.reduce((s,p)=> s+(data[p.key].hourly[i]||0), 0));

  chartInstances[cid2] = new Chart(c2, {
    type:'line',
    data:{
      labels: BKL_HOURS,
      datasets:[{
        label:'Total Backlog',
        data: totalHourly,
        borderColor: var_orange(),
        backgroundColor: var_orange()+'22',
        fill: true,
        tension: .4,
        pointRadius: 4,
        pointHoverRadius: 7,
        pointBackgroundColor: var_orange(),
        borderWidth: 2.5,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        ...d.plugins,
        tooltip:{
          ...d.plugins.tooltip,
          callbacks:{
            label: ctx => ` Total: ${ctx.parsed.y.toLocaleString('pt-BR')} pkgs`
          }
        }
      },
      scales: d.scales,
      animation:{ onComplete: () => drawLineLabels(chartInstances[cid2]) },
    }
  });
}

function renderUserGrids(){
  const isAdmin = currentUser && (currentUser.role === 'Administrador' || currentUser.role === 'Administradora');
  renderGrid('grid-ativos',   USERS.filter(u => u.active),  isAdmin);
  renderGrid('grid-inativos', USERS.filter(u => !u.active), isAdmin);
  renderGrid('grid-todos',    USERS,                         isAdmin);
}

function renderGrid(containerId, users, isAdmin){
  const el = document.getElementById(containerId);
  if(!el) return;
  if(!users.length){
    el.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:20px">Nenhum usuário encontrado.</div>';
    return;
  }
  el.innerHTML = users.map((u, idx) => {
    const globalIdx = USERS.indexOf(u);
    const statusPill = u.active
      ? '<span class="status-pill active-pill"><i class="fas fa-circle" style="font-size:6px"></i> Ativo</span>'
      : '<span class="status-pill inactive-pill"><i class="fas fa-circle" style="font-size:6px"></i> Inativo</span>';
    const toggleBtn = u.active
      ? `<button class="uca-btn" onclick="toggleUser(${globalIdx})" title="Desativar"><i class="fas fa-toggle-on"></i> Desativar</button>`
      : `<button class="uca-btn success" onclick="toggleUser(${globalIdx})" title="Ativar"><i class="fas fa-toggle-off"></i> Ativar</button>`;
    const deleteBtn = isAdmin && u.email !== 'admin'
      ? `<button class="uca-btn danger" onclick="deleteUser(${globalIdx})" title="Excluir"><i class="fas fa-trash"></i></button>`
      : `<button class="uca-btn" style="opacity:.3;cursor:not-allowed" title="${u.email === 'admin' ? 'Admin não pode ser excluído' : 'Somente admins podem excluir'}" disabled><i class="fas fa-lock"></i></button>`;
    return `
      <div class="user-card ${u.active ? '' : 'inactive'}" id="ucard-${globalIdx}">
        <div class="user-card-header">
          <div class="user-card-avatar">${u.initials}</div>
          <div class="user-card-info">
            <div class="user-card-name">${u.name}</div>
            <div class="user-card-role">${u.role} ${statusPill}</div>
          </div>
        </div>
        <div class="user-card-email"><i class="fas fa-envelope" style="font-size:10px"></i> ${u.email}</div>
        <div class="user-card-meta"><i class="fas fa-user-gear" style="font-size:10px"></i> Criado por: <strong>${u.createdBy}</strong> em ${u.createdAt}</div>
        <div class="user-card-actions">
          ${toggleBtn}
          ${deleteBtn}
        </div>
      </div>`;
  }).join('');
}

function toggleUser(idx){
  const u = USERS[idx];
  if(!u) return;
  // Prevent deactivating own account
  if(currentUser && u.email === currentUser.email){
    showToast('Você não pode desativar sua própria conta.', true); return;
  }
  u.active = !u.active;
  renderUserGrids();
  showToast(u.active ? `✓ ${u.name} ativado(a) com sucesso.` : `${u.name} desativado(a).`, !u.active);
}

function deleteUser(idx){
  const u = USERS[idx];
  if(!u) return;
  const isAdmin = currentUser && (currentUser.role === 'Administrador' || currentUser.role === 'Administradora');
  if(!isAdmin){ showToast('Somente administradores podem excluir usuários.', true); return; }
  if(u.email === 'admin'){ showToast('O usuário admin não pode ser excluído.', true); return; }
  if(currentUser && u.email === currentUser.email){ showToast('Você não pode excluir sua própria conta.', true); return; }
  // Confirm
  const card = document.getElementById('ucard-' + idx);
  if(card) card.style.outline = '2px solid var(--red)';
  const confirmed = confirm(`Excluir permanentemente o usuário "${u.name}" (${u.email})?\nEsta ação não pode ser desfeita.`);
  if(!confirmed){ if(card) card.style.outline = ''; return; }
  USERS.splice(idx, 1);
  renderUserGrids();
  showToast(`Usuário ${u.name} excluído.`, false);
}

function createUser(){
  const name     = document.getElementById('nu-name').value.trim();
  const email    = document.getElementById('nu-email').value.trim().toLowerCase();
  const password = document.getElementById('nu-password').value;
  const role     = document.getElementById('nu-role').value;
  const initials = document.getElementById('nu-initials').value.trim().toUpperCase() ||
                   name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  if(!name || !email || !password || !role){
    showToast('Preencha todos os campos obrigatórios.', true); return;
  }
  if(password.length < 6){
    showToast('A senha deve ter ao menos 6 caracteres.', true); return;
  }
  if(USERS.find(u => u.email === email)){
    showToast('Já existe um usuário com este e-mail.', true); return;
  }

  const today = new Date();
  const dateStr = String(today.getDate()).padStart(2,'0') + '/' +
                  String(today.getMonth()+1).padStart(2,'0') + '/' + today.getFullYear();
  USERS.push({
    email, password, name, initials, role,
    active: true,
    createdBy: currentUser ? currentUser.name : 'Sistema',
    createdAt: dateStr
  });
  clearNewUserForm();
  showToast('✓ Usuário ' + name + ' cadastrado com sucesso!');
  // Switch to Ativos tab
  const tabs = document.querySelectorAll('.cfg-tab');
  cfgTab('ativos', tabs[1]);
}

function currentShift(){
  const h=new Date().getHours();
  if(h>=6&&h<14) return 'T1  ·  06:00 – 14:00';
  if(h>=14&&h<22) return 'T2  ·  14:00 – 22:00';
  return 'T3  ·  22:00 – 06:00';
}
function tickClock(){
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0');
  const mm=String(now.getMinutes()).padStart(2,'0');
  const ss=String(now.getSeconds()).padStart(2,'0');
  const dd=String(now.getDate()).padStart(2,'0');
  const mo=String(now.getMonth()+1).padStart(2,'0');
  const yyyy=now.getFullYear();
  const dias=['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
  const dia=dias[now.getDay()];
  const clk=document.getElementById('digital-clock');
  const dat=document.getElementById('digital-date');
  const shf=document.getElementById('digital-shift');
  if(clk) clk.textContent=hh+':'+mm+':'+ss;
  if(dat) dat.textContent=dia+'  '+dd+'/'+mo+'/'+yyyy;
  if(shf) shf.textContent=currentShift();
}
setInterval(tickClock,1000); tickClock();

/* ── Print Dash — captura literal da tela atual ── */
function printDash(sectionId){
  const section = document.getElementById('section-' + sectionId);
  if(!section){ showToast('Seção não encontrada.', true); return; }
  const title = section.querySelector('.section-title')?.textContent || sectionId;

  const clone = section.cloneNode(true);
  clone.querySelectorAll('.section-dl-group, .table-search, .btn-outline, .pdf-menu-wrap').forEach(el => el.remove());

  // Converte canvas (gráficos) em imagens estáticas
  const origCanvases = section.querySelectorAll('canvas');
  const cloneCanvases = clone.querySelectorAll('canvas');
  origCanvases.forEach((cv, i) => {
    if(cloneCanvases[i]){
      try {
        const img = document.createElement('img');
        img.src = cv.toDataURL('image/png');
        img.style.cssText = 'width:100%;height:100%;object-fit:contain';
        cloneCanvases[i].replaceWith(img);
      } catch(e){}
    }
  });

  const styles = Array.from(document.styleSheets).map(ss => {
    try { return Array.from(ss.cssRules).map(r => r.cssText).join('\n'); } catch(e){ return ''; }
  }).join('\n');

  const html = `<!DOCTYPE html>
<html><head><meta charset="UTF-8"/><title>${title} — Print Dash</title>
<style>
  ${styles}
  body { background:#1a1d2e !important; color:#e8eaf0 !important; margin:0; padding:0; }
  #app, nav, #header, .header-toggle, #sidebar, #sidebar-overlay { display:none !important; }
  #main-content { padding:16px !important; margin:0 !important; }
  .section { display:block !important; animation:none !important; }
  .section-dl-group, .table-search, .btn-outline, .pdf-menu-wrap { display:none !important; }
  canvas { display:none !important; }
  @page { size: landscape; margin: 8mm; }
  @media print { * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; } }
</style></head><body>
<div style="padding:16px">

function buildPrintContent(section){
  let html = '';

  // KPI strip ou clst-summary-bar
  const kpiStrip = section.querySelector('.kpi-strip, .clst-summary-bar');
  if(kpiStrip){
    html += '<div class="kpi-row">';
    kpiStrip.querySelectorAll('.kpi-strip-item, .clst-summary-item').forEach(item => {
      const label = item.querySelector('.kpi-strip-label, .clst-summary-label')?.textContent || '';
      const val   = item.querySelector('.kpi-strip-value, .clst-summary-value')?.textContent || '';
      const delta = item.querySelector('.kpi-strip-delta')?.textContent?.trim() || '';
      html += `<div class="kpi-box"><div class="kpi-label">${label}</div><div class="kpi-val">${val}</div><div class="kpi-delta">${delta}</div></div>`;
    });
    html += '</div>';
  }

  // Tabelas
  section.querySelectorAll('table').forEach(table => {
    const card = table.closest('.table-card');
    const tableTitle = card?.querySelector('.table-toolbar-title')?.textContent || '';
    if(tableTitle) html += `<div style="font-size:11px;font-weight:700;margin:12px 0 6px">${tableTitle}</div>`;
    html += '<table>';
    const ths = table.querySelectorAll('thead th');
    if(ths.length) html += '<thead><tr>' + Array.from(ths).map(th => `<th>${th.textContent}</th>`).join('') + '</tr></thead>';
    html += '<tbody>';
    table.querySelectorAll('tbody tr:not(.empty-row)').forEach(row => {
      if(row.style.display === 'none') return;
      html += '<tr>' + Array.from(row.querySelectorAll('td')).map(td =>
        `<td>${td.querySelector('.badge') ? `<span class="badge">${td.textContent.trim()}</span>` : td.textContent.trim()}</td>`
      ).join('') + '</tr>';
    });
    html += '</tbody></table>';
  });

  return html || '<p style="color:#999;font-size:11px">Nenhum conteúdo tabular disponível para exportação.</p>';
}

function downloadCSV(sectionId){
  const section = document.getElementById('section-' + sectionId);
  if(!section){ showToast('Seção não encontrada.', true); return; }

  const title = section.querySelector('.section-title')?.textContent || sectionId;
  const tables = section.querySelectorAll('table');

  if(!tables.length){ showToast('Nenhuma tabela encontrada nesta seção.', true); return; }

  let csvContent = '';
  const BOM = '\uFEFF';

  tables.forEach((table, tIdx) => {
    const card = table.closest('.table-card');
    const tableTitle = card?.querySelector('.table-toolbar-title')?.textContent || ('Tabela ' + (tIdx+1));
    if(tIdx > 0) csvContent += '\n\n';
    csvContent += `# ${tableTitle}\n`;
    csvContent += `# Exportado em: ${new Date().toLocaleString('pt-BR')} | Usuário: ${typeof currentUser!=='undefined' && currentUser ? currentUser.name : '—'}\n`;
    const ths = table.querySelectorAll('thead th');
    if(ths.length) csvContent += Array.from(ths).map(th => csvEsc(th.textContent)).join(';') + '\n';
    table.querySelectorAll('tbody tr:not(.empty-row)').forEach(row => {
      if(row.style.display === 'none') return;
      const cells = Array.from(row.querySelectorAll('td')).map(td => csvEsc(td.textContent.trim()));
      csvContent += cells.join(';') + '\n';
    });
  });

  const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `jarvis_rj2_${sectionId}_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✓ CSV exportado com sucesso!');
}

function csvEsc(val){
  const s = String(val).replace(/"/g, '""');
  return /[;,\n\r"]/.test(s) ? `"${s}"` : s;
}

function setJornalDates(){
  const now = new Date();
  const week = getWeekNumber(now);
  const el = document.getElementById('jornal-edition');
  if(el) el.textContent = `Edição Semana ${week} · ${now.getFullYear()}`;
  const meta = document.getElementById('jornal-date-meta');
  if(meta) meta.textContent = `Publicado em ${now.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long', year:'numeric'})} · COP RJ2 2026`;
  const bdayLabel = document.getElementById('bday-week-label');
  if(bdayLabel) bdayLabel.textContent = `Semana ${week} · ${now.toLocaleDateString('pt-BR', {month:'long', year:'numeric'})}`;
}

function getWeekNumber(d){
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

/* ================================================================
   THEME TOGGLE — dark / light
================================================================ */
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('jarvis-theme', next); } catch(e){}
  // Update label
  const lbl = document.querySelector('.theme-switch-label');
  if(lbl) lbl.textContent = next === 'dark' ? 'Tema Claro' : 'Tema Escuro';
  // Recria os gráficos para pegar as cores do novo tema (--grid, --chart-1..8 etc.)
  destroyCharts();
  renderSection(currentSection);
}

// Restore saved theme on load
(function(){
  try {
    const saved = localStorage.getItem('jarvis-theme');
    if(saved){
      document.documentElement.setAttribute('data-theme', saved);
      // Label will be updated after DOM loads
      window.addEventListener('DOMContentLoaded', () => {
        const lbl = document.querySelector('.theme-switch-label');
        if(lbl) lbl.textContent = saved === 'dark' ? 'Tema Claro' : 'Tema Escuro';
      });
    }
  } catch(e){}
})();
