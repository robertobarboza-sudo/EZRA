/* ================================================================
   DATA SERVICE
================================================================ */
const DataService = (() => {
  const CONFIG = {
    source: 'mock',
    refreshInterval: 60,
    sheets: { gestao:'', performance:'', asm:'', conveyor:'', inbound:'', outbound:'', tratativas:'', clusterizacao:'' },
    api: { baseUrl:'', token:'', endpoints: { gestao:'/api/gestao', performance:'/api/performance',
      asm:'/api/asm', conveyor:'/api/conveyor', inbound:'/api/inbound', outbound:'/api/outbound', tratativas:'/api/tratativas' } }
  };

  function parseCSV(text){
    const lines = text.trim().split('\n'); if(lines.length<2) return [];
    const headers = lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
    return lines.slice(1).map(line=>{
      const vals = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g)||[];
      const obj={}; headers.forEach((h,i)=>{ obj[h]=(vals[i]||'').replace(/"/g,'').trim(); }); return obj;
    });
  }

  async function fetchSheets(s){
    const url=CONFIG.sheets[s]; if(!url) throw new Error('URL não configurada: '+s);
    const r=await fetch(url); if(!r.ok) throw new Error('HTTP '+r.status);
    return parseCSV(await r.text());
  }

  async function fetchAPI(s){
    const {baseUrl,token,endpoints}=CONFIG.api;
    const r=await fetch(baseUrl+endpoints[s],{headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}});
    if(!r.ok) throw new Error('HTTP '+r.status); return r.json();
  }

  function fetchMock(s){
    return new Promise(res=>setTimeout(()=>res(MOCK[s]||{}), 500+Math.random()*400));
  }

  async function load(s){
    if(CONFIG.source==='sheets'&&CONFIG.sheets[s]) return {data:await fetchSheets(s),source:'Google Sheets'};
    if(CONFIG.source==='api'&&CONFIG.api.baseUrl) return {data:await fetchAPI(s),source:'API REST'};
    return {data:await fetchMock(s),source:'Demo'};
  }

  async function saveOccurrence(payload){
    if(CONFIG.source==='api'&&CONFIG.api.baseUrl){
      const {baseUrl,token}=CONFIG.api;
      const r=await fetch(baseUrl+'/api/tratativas',{method:'POST',
        headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(!r.ok) throw new Error('HTTP '+r.status); return r.json();
    }
    return {...payload, id:'#OC-'+(2847+Math.floor(Math.random()*100))};
  }

  return {load, saveOccurrence, CONFIG};
})();

/* ================================================================
   ACCESS CONTROL — Define quais seções cada role pode acessar
   Roles: Administrador | Analista | Lider | Demo
================================================================ */
const ALL_SECTIONS = [
  'gestao','performance','asm','conveyor','inbound','outbound','clusterizacao',
  'tratativas','laborplan','backlog','arvore','kpioverview','scorecard',
  'absenteismo','forecast','auditoria','organograma','configuracoes',
  'matriz','mapadados','jornal'
];

const GOV_SECTIONS = ['matriz','mapadados','jornal'];

const ROLE_ACCESS = {
  // Acesso total
  'Administrador': ALL_SECTIONS,

  // Acesso total (igual ao admin, sem restrições)
  'Analista': ALL_SECTIONS,

  // Acesso total exceto Score Card
  'Lider': ALL_SECTIONS.filter(s => s !== 'scorecard'),

  // Apenas Governança
  'Demo': GOV_SECTIONS,
};

function canAccess(section){
  if(!currentUser) return false;
  const allowed = ROLE_ACCESS[currentUser.role] || GOV_SECTIONS;
  return allowed.includes(section);
}

function applyAccessControl(){
  if(!currentUser) return;
  const allowed = ROLE_ACCESS[currentUser.role] || GOV_SECTIONS;
  // Hide/show nav items based on access
  document.querySelectorAll('.nav-item[data-section]').forEach(item => {
    const sec = item.dataset.section;
    if(!allowed.includes(sec)){
      item.style.display = 'none';
    } else {
      item.style.display = '';
    }
  });
  // If current section is not allowed, redirect to first allowed
  if(!allowed.includes(currentSection)){
    const first = allowed[0] || 'gestao';
    const el = document.querySelector(`.nav-item[data-section="${first}"]`);
    navigateTo(first, el);
  }
}

/* ================================================================
   AUTO AUTH — o servidor (Code.gs) já garante que só chega até aqui
   quem tem e-mail @shopee.com. Aqui só montamos o objeto do usuário:
   usa os dados cadastrados em USERS se existir, senão usa um perfil
   padrão (role "Demo") derivado do próprio e-mail.
================================================================ */
function runAutoAuth(){
  __dbg__('runAutoAuth() executando');
  const panel = document.getElementById('login-form-panel');
  const email = (window.__CURRENT_USER_EMAIL__ || '').trim().toLowerCase();

  if(!email){
    // E-mail não identificado — deixa entrar mesmo assim como "Visitante".
    const guest = {
      email: '', name: 'Visitante', initials: 'VS', role: 'Demo', active: true,
      createdBy: 'Auto (e-mail não identificado)', createdAt: new Date().toLocaleDateString('pt-BR')
    };
    sessionStorage.setItem('od2-user', JSON.stringify(guest));
    enterPortal(guest);
    return;
  }

  let user = USERS.find(u => u.email.toLowerCase() === email);
  if(!user){
    const namePart = email.split('@')[0].split('.').filter(Boolean)
      .map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ') || email;
    const initials = namePart.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase() || '??';
    user = {
      email, name: namePart, initials, role: 'Demo', active: true,
      createdBy: 'Auto (domínio Shopee)', createdAt: new Date().toLocaleDateString('pt-BR')
    };
  }

  sessionStorage.setItem('od2-user', JSON.stringify(user));
  enterPortal(user);
}

function renderAuthDenied(panel, email, msg){
  panel.innerHTML = `
    <div class="auth-icon inactive"><i class="fas fa-triangle-exclamation"></i></div>
    <div class="login-form-title">Acesso indisponível</div>
    ${email ? `<div class="auth-email">${email}</div>` : ''}
    <div class="auth-msg">${msg}</div>
    <button class="login-btn" onclick="runAutoAuth()"><i class="fas fa-rotate-right"></i> Tentar novamente</button>
    <div class="login-footer">J.A.R.V.I.S. v1.0 · COP RJ2 2026 · Acesso restrito</div>
  `;
}

function enterPortal(user){
  document.getElementById('login-screen').classList.add('hidden');
  applyUser(user);
  applyAccessControl();
  // Redirect Demo users straight to Governança
  const firstSection = (ROLE_ACCESS[user.role] || ['matriz'])[0];
  const firstEl = document.querySelector(`.nav-item[data-section="${firstSection}"]`);
  if(firstEl) firstEl.classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  const firstSec = document.getElementById('section-' + firstSection);
  if(firstSec) firstSec.classList.add('active');
  currentSection = firstSection;
  renderSection(firstSection);
  DataService.load('tratativas').then(({data}) => {
    if(data?.notificacoes) renderNotifications(data.notificacoes);
  });
  // JARVIS voice welcome
  jarvisSpeak(user.name);
}

let JARVIS_VOICE_NAME = 'Google português do Brasil'; // default

function jarvisSpeak(userName){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  const firstName = userName.split(' ')[0];
  const hour = new Date().getHours();
  const period = hour >= 5 && hour <= 12 ? 'Bom dia'
               : hour >= 13 && hour <= 17 ? 'Boa tarde'
               : 'Boa noite';

  const fullText = `${period}, ${firstName}. Bem-vindo de volta.`;
  const utterance = new SpeechSynthesisUtterance(fullText);

  function findVoice(){
    const voices = window.speechSynthesis.getVoices();
    if(JARVIS_VOICE_NAME){
      return voices.find(v => v.name === JARVIS_VOICE_NAME) || null;
    }
    return voices.find(v => v.lang === 'pt-BR') || voices[0] || null;
  }

  function speak(){
    const voice = findVoice();
    if(voice) utterance.voice = voice;
    utterance.lang   = 'pt-BR';
    utterance.rate   = 1.0;
    utterance.pitch  = 1.0;
    utterance.volume = 1.0;
    window.speechSynthesis.speak(utterance);
  }

  if(window.speechSynthesis.getVoices().length){
    speak();
  } else {
    window.speechSynthesis.onvoiceschanged = () => { speak(); };
  }
}

function testJarvisVoice(){
  if(!currentUser) return;
  jarvisSpeak(currentUser.name);
}

function buildVoiceSelector(){
  const container = document.getElementById('voice-selector-wrap');
  if(!container) return;
  const voices = window.speechSynthesis?.getVoices() || [];
  const ptVoices = voices.filter(v => v.lang.startsWith('pt'));
  const allVoices = voices;

  if(!voices.length){
    container.innerHTML = '<p style="font-size:12px;color:var(--text-muted)">Nenhuma voz encontrada. Tente recarregar a página.</p>';
    return;
  }

  container.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:8px">
      <label class="form-label">Voz de boas-vindas</label>
      <select class="form-input" id="voice-select" onchange="JARVIS_VOICE_NAME=this.value;try{localStorage.setItem('jarvis-voice',this.value)}catch(e){}" style="max-width:360px">
        <option value="">Automático (melhor voz pt-BR)</option>
        ${ptVoices.length ? '<optgroup label="── Português ──">' + ptVoices.map(v =>
          `<option value="${v.name}" ${JARVIS_VOICE_NAME===v.name?'selected':''}>${v.name} (${v.lang})</option>`
        ).join('') + '</optgroup>' : ''}
        <optgroup label="── Todas as vozes ──">
          ${allVoices.filter(v=>!v.lang.startsWith('pt')).map(v =>
          `<option value="${v.name}" ${JARVIS_VOICE_NAME===v.name?'selected':''}>${v.name} (${v.lang})</option>`
        ).join('')}
        </optgroup>
      </select>
      <button class="btn btn-outline" onclick="testJarvisVoice()" style="width:fit-content;font-size:11px">
        <i class="fas fa-play"></i> Testar voz
      </button>
    </div>`;
}

function doLogout(){
  sessionStorage.removeItem('od2-user');
  currentUser = null;
  closeUserMenu();
  // Acesso é vinculado à conta Google (SSO) — recarregar reavalia o e-mail atual.

}

function navigateTo(id, el){
  if(currentSection===id) return;
  // Access control guard
  if(!canAccess(id)){
    showToast('Acesso não permitido para o seu perfil.', true);
    return;
  }
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const target=document.getElementById('section-'+id);
  if(target) target.classList.add('active');
  if(el) el.classList.add('active');
  const m = sectionMeta[id] || {};
  document.getElementById('greet-sub').textContent = m.sub || id;
  const mTitle = document.getElementById('header-mobile-title');
  if(mTitle) mTitle.textContent = m.title || id;
  currentSection=id;
  destroyCharts();
  renderSection(id);
  if(window.innerWidth<=768) closeMobileSidebar();
}

async function renderSection(section){
  setBadge(section,'loading');
  try {
    const {data,source} = await DataService.load(section);
    setBadge(section,'ok',source);
    const fn = {gestao:renderGestao, performance:renderPerformance, asm:renderAsm,
      backlog:renderBacklog,
      conveyor:renderConveyor, inbound:renderInbound, outbound:renderOutbound, tratativas:renderTratativas,
      laborplan:renderLaborplan, arvore:renderArvore, kpioverview:renderKpioverview,
      scorecard:renderScorecard, absenteismo:renderAbsenteismo,
      configuracoes:renderConfiguracoes, forecast:renderForecast,
      auditoria:renderAuditoria, clusterizacao:renderClusterizacao,
      matriz:renderMatriz, mapadados:renderMapaDados, jornal:renderJornal};
    if(fn[section]) fn[section](data);
    else renderPlaceholder(section);
  } catch(err){
    setBadge(section,'error','Erro: '+err.message);
    console.error('[DataService]',err);
  }
}

function refreshSection(){
  triggerSync(); destroyCharts(); renderSection(currentSection);
}

function onFilterChange(){
  clearTimeout(onFilterChange._t);
  onFilterChange._t = setTimeout(()=>refreshSection(), 300);
}

function setBadge(s, state, label=''){
  const el=document.getElementById('ds-badge-'+s); if(!el) return;
  el.className = 'ds-badge ' + state;
  if(state==='loading') el.innerHTML='<i class="fas fa-circle-notch fa-spin"></i> Conectando…';
  else if(state==='error') el.innerHTML='<i class="fas fa-exclamation-circle"></i> '+label;
  else el.innerHTML='<i class="fas fa-circle-dot"></i> '+label;
}

/* ── Universal numeric label drawer — line, bar, pie, doughnut ── */
function fmtVal(val){
  if(val==null||val===undefined) return null;
  if(typeof val!=='number') return String(val);
  if(val===0) return '0';
  return val>=10000 ? (val/1000).toFixed(0)+'k'
       : val>=1000  ? (val/1000).toFixed(1)+'k'
       : val%1===0  ? String(val)
       : val.toFixed(1);
}

function drawAllLabels(chart){
  if(!chart||!chart.ctx) return;
  const ctx=chart.ctx;
  const type=chart.config.type;
  ctx.save();

  if(type==='line'){
    chart.data.datasets.forEach((ds,di)=>{
      const meta=chart.getDatasetMeta(di);
      meta.data.forEach((pt,i)=>{
        const label=fmtVal(ds.data[i]); if(!label) return;
        ctx.font='bold 9px Inter,sans-serif';
        ctx.fillStyle=ds.borderColor||'#fff';
        ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText(label, pt.x, pt.y-7);
      });
    });

  } else if(type==='bar'){
    chart.data.datasets.forEach((ds,di)=>{
      const meta=chart.getDatasetMeta(di);
      meta.data.forEach((bar,i)=>{
        const label=fmtVal(ds.data[i]); if(!label||label==='0') return;
        const {x,y,base,width}=bar.getProps(['x','y','base','width'],true);
        const barH=Math.abs(base-y);
        ctx.font='bold 9px Inter,sans-serif';
        ctx.textAlign='center';
        if(barH>16){
          // inside bar, near top
          ctx.fillStyle='rgba(255,255,255,.9)';
          ctx.textBaseline='top';
          ctx.fillText(label, x, y+4);
        } else {
          // above bar
          ctx.fillStyle=ds.backgroundColor||'#fff';
          ctx.textBaseline='bottom';
          ctx.fillText(label, x, y-3);
        }
      });
    });

  } else if(type==='pie'||type==='doughnut'){
    chart.data.datasets.forEach((ds,di)=>{
      const meta=chart.getDatasetMeta(di);
      const total=ds.data.reduce((a,b)=>a+(b||0),0);
      meta.data.forEach((arc,i)=>{
        const val=ds.data[i]; if(!val||val===0) return;
        const pct=Math.round(val/total*100);
        if(pct<4) return; // skip tiny slices
        const angle=(arc.startAngle+arc.endAngle)/2;
        const r=(arc.outerRadius+(type==='doughnut'?arc.innerRadius:0))/2;
        const x=arc.x+Math.cos(angle)*r*(type==='doughnut'?1:0.65);
        const y=arc.y+Math.sin(angle)*r*(type==='doughnut'?1:0.65);
        ctx.font='bold 10px Inter,sans-serif';
        ctx.fillStyle='#fff';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(pct+'%', x, y);
      });
    });
  }

  ctx.restore();
}

function genClusterData(){
  // 142 ruas distribuídas entre 17 docas (~8 ruas/doca em média)
  const TOTAL_RUAS = 142;
  const TOTAL_DOCAS = 17;
  const docas = [];
  let ruaCounter = 1;
  let cidadeIdx = 0;

  // Distribui 142 ruas entre 17 docas o mais uniformemente possível
  const base = Math.floor(TOTAL_RUAS / TOTAL_DOCAS);
  const resto = TOTAL_RUAS % TOTAL_DOCAS;
  const ruasPerDoca = Array.from({length:TOTAL_DOCAS}, (_,i) => base + (i < resto ? 1 : 0));

  for(let d = 1; d <= TOTAL_DOCAS; d++){
    const numRuas = ruasPerDoca[d-1];
    const ruas = [];
    for(let r = 0; r < numRuas; r++){
      const ruaNum = String(ruaCounter).padStart(3,'0');
      ruaCounter++;
      const isEmpty = Math.random() < 0.12; // ~12% completely empty
      const occPct = isEmpty ? 0 : Math.floor(Math.random()*95)+5;
      const cap = [10,15,20,22][Math.floor(Math.random()*4)];
      const occCount = Math.round(cap * occPct/100);

      ruas.push({
        rua: 'RUA ' + ruaNum,
        spp: isEmpty ? null : Math.floor(Math.random()*450)+100,
        saca: isEmpty ? null : (Math.random()<0.5 ? Math.floor(Math.random()*120)+10 : null),
        scuttle: isEmpty ? null : (Math.random()<0.3 ? Math.floor(Math.random()*15)+1 : null),
        posOcc: occCount,
        posCap: cap,
        aging: isEmpty ? null : +(Math.random()*18+1).toFixed(1),
        pacotesOvr: isEmpty ? null : Math.floor(Math.random()*6000)+300,
        proxCpt: isEmpty ? null : `${String(Math.floor(Math.random()*14)+10).padStart(2,'0')}:${['00','15','30','45'][Math.floor(Math.random()*4)]}`,
        timerCpt: isEmpty ? null : `${String(Math.floor(Math.random()*5)).padStart(2,'0')}:${String(Math.floor(Math.random()*59)).padStart(2,'0')}`,
        ocupacao: occPct,
        posicoesPend: Math.floor(Math.random()*7),
        cidade: isEmpty ? null : CIDADES_DEMO[cidadeIdx % CIDADES_DEMO.length],
        clusterIdeal: isEmpty ? null : (Math.random() < 0.6
          ? CIDADES_DEMO[cidadeIdx % CIDADES_DEMO.length]
          : CIDADES_DEMO[(cidadeIdx + Math.floor(Math.random()*3)+1) % CIDADES_DEMO.length]),
      });
      if(!isEmpty) cidadeIdx++;
    }
    docas.push({ id: 'DOCA ' + String(d).padStart(3,'0'), ruas });
  }
  return docas;
}

function buildClusterSummary(docas){
  const allRuas = docas.flatMap(d => d.ruas);
  const ocupadas = allRuas.filter(r => r.posOcc > 0).length;
  const livres = allRuas.length - ocupadas;
  const totalPacotes = allRuas.reduce((s,r)=>s+(r.pacotesOvr||0),0);
  const agingVals = allRuas.filter(r=>r.aging!=null).map(r=>r.aging);
  const agingMedio = agingVals.length ? (agingVals.reduce((a,b)=>a+b,0)/agingVals.length).toFixed(1) : '0.0';
  const pendEnd = allRuas.reduce((s,r)=>s+(r.posicoesPend||0),0);
  const posOcupadas = allRuas.reduce((s,r)=>s+r.posOcc,0);
  const posDisponiveis = allRuas.reduce((s,r)=>s+(r.posCap-r.posOcc),0);
  const ruasOk = allRuas.filter(r => !r.cidade || r.cidade === r.clusterIdeal).length;
  const ruasNok = allRuas.length - ruasOk;
  const pctClusterizacao = ((ruasOk/allRuas.length)*100).toFixed(1);

  const now = new Date();

  const items = [
    { label:'Atualização', value:atualizacao, cls:'' },
    { label:'% Clusterização', value:pctClusterizacao+'%', cls: pctClusterizacao<60?'alert':'ok' },
    { label:'Total Pacotes End.', value:totalPacotes.toLocaleString('pt-BR'), cls:'accent' },
    { label:'Aging Médio', value:agingMedio, cls: agingMedio>12?'alert':'' },
    { label:'Pctos. Pendentes End.', value:pendEnd.toLocaleString('pt-BR'), cls:'' },
    { label:'Pos. Ocupadas', value:posOcupadas.toLocaleString('pt-BR'), cls:'' },
    { label:'Pos. Disponíveis', value:posDisponiveis.toLocaleString('pt-BR'), cls:'ok' },
    { label:'Ruas Ocupadas', value:ocupadas, cls:'alert' },
    { label:'Ruas Livres', value:livres, cls:'ok' },
    { label:'Ruas OK', value:ruasOk, cls:'ok' },
    { label:'Ruas NOK', value:ruasNok, cls:'alert' },
  ];

  document.getElementById('clst-summary').innerHTML = items.map(it => `
    <div class="clst-summary-item">
      <div class="clst-summary-label">${it.label}</div>

function buildClusterTable(docas){
  const allRuas = docas.flatMap(d => d.ruas);

  // ── HEADER ROWS ──
  let thead = '<thead>';
  // Row 1: DOCA group headers
  thead += '<tr><th class="clst-rowlabel">DOCA</th>';
  docas.forEach(d => {
    thead += `<th class="clst-doca-header" colspan="${d.ruas.length}">${d.id}</th>`;
  });
  thead += '</tr>';
  // Row 2: RUA headers
  thead += '<tr><th class="clst-rowlabel">RUA</th>';
  allRuas.forEach(r => { thead += `<th class="clst-rua-header">${r.rua.replace('RUA ','')}</th>`; });
  thead += '</tr>';
  thead += '</thead>';

  // ── DATA ROWS ──
  const rowDefs = [
    { key:'spp',        label:'SPP Posição',        fmt:v=>v==null?'':v },
    { key:'saca',       label:'SACA',                fmt:v=>v==null?'':v },
    { key:'scuttle',    label:'SCUTTLE',             fmt:v=>v==null?'':v },
    { key:'posOcc',     label:'POS. OCC',            fmt:v=>v },
    { key:'posCap',     label:'POS. CAP',            fmt:v=>v },
    { key:'aging',      label:"AGING TO'S",          fmt:v=>v==null?'':v.toFixed(1).replace('.',',') },
    { key:'pacotesOvr', label:'PACOTES OVR.',        fmt:v=>v==null?'':v.toLocaleString('pt-BR') },
    { key:'proxCpt',    label:'PRÓX. CPT',           fmt:v=>v||'' },
    { key:'timerCpt',   label:'TIMER CPT',           fmt:v=>v||'' },
    { key:'ocupacao',   label:'OCUPAÇÃO',            fmt:v=>v+'%', isOcc:true },
  ];

  let tbody = '<tbody>';
  rowDefs.forEach(rd => {
    tbody += `<tr><td class="clst-rowlabel">${rd.label}</td>`;
    allRuas.forEach(r => {
      const raw = r[rd.key];
      let cls = '';
      if(rd.isOcc){
        cls = raw===0?'clst-occ-free':raw>=70?'clst-occ-busy':raw>=40?'clst-occ-mid':'clst-occ-free';
      }
      tbody += `<td class="${cls}">${rd.fmt(raw)}</td>`;
    });
    tbody += '</tr>';
  });

  // ── OCUPAÇÃO STAGE POR RUA (fundo verde fixo, barra vermelha sobe conforme ocupação) ──
  tbody += `<tr class="clst-section-row"><td colspan="${allRuas.length+1}">OCUPAÇÃO STAGE POR RUA</td></tr>`;
  tbody += `<tr><td class="clst-rowlabel" style="vertical-align:bottom">% Ocupação</td>`;
  allRuas.forEach(r => {
    const pct = r.posCap>0 ? r.ocupacao : 0;
    const labelInside = pct >= 14; // só cabe o texto dentro se a barra tiver altura mínima
    tbody += `<td style="padding:6px 4px;min-width:42px;vertical-align:bottom">
      <div style="height:200px;width:100%;background:rgba(16,185,129,.35);border-radius:3px;position:relative;overflow:hidden;display:flex;align-items:flex-end;justify-content:center">
        <div style="position:absolute;bottom:0;left:0;width:100%;height:${pct}%;background:#ef4444;transition:height .4s;display:flex;align-items:flex-start;justify-content:center">
          ${labelInside ? `<span style="font-size:9px;font-weight:700;color:#fff;margin-top:4px;text-shadow:0 1px 2px rgba(0,0,0,.4)">${pct}%</span>` : ''}
        </div>
        ${!labelInside ? `<span style="position:absolute;bottom:2px;font-size:9px;font-weight:700;color:var(--text-muted)">${pct}%</span>` : ''}
      </div>
    </td>`;
  });
  tbody += '</tr>';

  // ── POSIÇÕES PEND. END. ──
  tbody += '<tr><td class="clst-rowlabel">POSIÇÕES PEND. END.</td>';
  allRuas.forEach(r => { tbody += `<td>${r.posicoesPend}</td>`; });
  tbody += '</tr>';

  // ── FANOUT ENDEREÇADO ──
  tbody += `<tr class="clst-section-row"><td colspan="${allRuas.length+1}">FANOUT ENDEREÇADO</td></tr>`;
  tbody += '<tr><td class="clst-rowlabel" style="vertical-align:bottom">Cidade / Hub</td>';
  allRuas.forEach(r => {
    tbody += `<td style="writing-mode:vertical-rl;text-orientation:mixed;height:170px;font-size:9px;padding:6px 3px;white-space:nowrap;overflow:visible">${r.cidade||'—'}</td>`;
  });
  tbody += '</tr>';

  // ── MATCH LINE — verde se Fanout == Ideal (ou vazio), vermelho se diferente ──
  tbody += '<tr style="height:6px">';
  tbody += '<td class="clst-rowlabel" style="padding:0;font-size:0">&nbsp;</td>';
  allRuas.forEach(r => {
    const isEmpty = !r.cidade;
    const matches = isEmpty || r.cidade === r.clusterIdeal;
    const color = matches ? '#10b981' : '#ef4444';
    tbody += `<td style="padding:0;height:6px;background:${color}" title="${isEmpty?'Vazio':matches?'Fanout = Ideal':'Fanout ≠ Ideal'}"></td>`;
  });
  tbody += '</tr>';

  // ── CLUSTERIZAÇÃO IDEAL ──
  tbody += `<tr class="clst-section-row"><td colspan="${allRuas.length+1}">CLUSTERIZAÇÃO IDEAL</td></tr>`;
  tbody += '<tr><td class="clst-rowlabel" style="vertical-align:bottom">Sugestão de Cluster</td>';
  allRuas.forEach(r => {
    if(!r.cidade){ tbody += '<td>—</td>'; return; }
    tbody += `<td style="writing-mode:vertical-rl;text-orientation:mixed;height:170px;font-size:9px;padding:6px 3px;white-space:nowrap;overflow:visible">${r.clusterIdeal}</td>`;
  });
  tbody += '</tr>';

  tbody += '</tbody>';

  document.getElementById('clst-main-table').innerHTML = thead + tbody;
}

async function submitOccurrence(e){
  e.preventDefault();
  const btn=e.target.querySelector('[type=submit]');
  btn.disabled=true; btn.innerHTML='<i class="fas fa-circle-notch fa-spin"></i> Registrando…';
  const payload={
    tipo:document.getElementById('oc-tipo').value,
    prioridade:document.getElementById('oc-prioridade').value,
    descricao:document.getElementById('oc-descricao').value,
    responsavel:document.getElementById('oc-responsavel').value,
    prazo:document.getElementById('oc-prazo').value,
    setor:document.getElementById('oc-setor').value,
    obs:document.getElementById('oc-obs').value,
    criadoEm:new Date().toISOString(),
  };
  try {
    const result=await DataService.saveOccurrence(payload);
    closeModal(); document.getElementById('form-ocorrencia').reset();
    const tbody=document.querySelector('#table-tratativas tbody');
    const id=result.id||'#OC-'+Date.now().toString().slice(-4);
    const pm={Crítica:'danger',Alta:'warning',Média:'neutral',Baixa:'neutral'};
    const row=document.createElement('tr');
    row.innerHTML=`<td>${id}</td><td>${payload.descricao}</td><td>${payload.tipo}</td>
      <td>${payload.responsavel}</td><td>${(payload.prazo||'—').replace('T',' ')}</td>
      <td><span class="badge badge-${pm[payload.prioridade]||'neutral'}">${payload.prioridade}</span></td>
      <td><span class="badge badge-info">Aberta</span></td>`;
    row.style.animation='fadeUp .4s ease';
    tbody.prepend(row);
    tbody.querySelectorAll('.empty-row').forEach(r=>r.remove());
    showToast('✓ Ocorrência registrada!');
  } catch(err){showToast('Erro: '+err.message,true);}
  finally{btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Registrar';}
}

// 24-hour labels from 06:00 to 05:00 (next day)
const BKL_HOURS = Array.from({length:24},(_,i)=>{
  const h=(6+i)%24; return String(h).padStart(2,'0')+':00';
});

const PROFILES = [
  { key:'p',  label:'P',     name:'Pequeno',  icon:'fa-envelope',       cls:'p'  },
  { key:'m',  label:'M',     name:'Médio',    icon:'fa-box',            cls:'m'  },
  { key:'g',  label:'G',     name:'Grande',   icon:'fa-cubes',          cls:'g'  },
  { key:'bk', label:'Bulky', name:'Bulky',    icon:'fa-pallet',         cls:'bk' },
];

const PROFILE_COLORS = { p:'#ee4d2d', m:'#06b6d4', g:'#10b981', bk:'#a78bfa' };

// Generate mock backlog data for a given type
function genBklData(type){
  const multi = type==='received'?1.4 : type==='packed'?1.0 : 0.6;
  return {
    p:  { total: Math.round(rnd(2000,5000,1)[0]*multi), meta:4000, hourly: rnd(80,320,24).map(v=>Math.round(v*multi)) },
    m:  { total: Math.round(rnd(1500,3500,1)[0]*multi), meta:3000, hourly: rnd(60,240,24).map(v=>Math.round(v*multi)) },
    g:  { total: Math.round(rnd(800,2000,1)[0]*multi),  meta:1500, hourly: rnd(30,160,24).map(v=>Math.round(v*multi)) },
    bk: { total: Math.round(rnd(300,900,1)[0]*multi),   meta:700,  hourly: rnd(10,80,24).map(v=>Math.round(v*multi))  },
  };
}

const BKL_DATA = {
  received: genBklData('received'),
  packed:   genBklData('packed'),
  eha:      genBklData('eha'),
};

function renderBacklog(){
  setBadge('backlog','ok','Em Construção');

// State: set of active backlog profile filters
const activeBklProfiles = new Set(['all']);

function bklProfileFilter(profile, el){
  if(profile === 'all'){
    activeBklProfiles.clear();
    activeBklProfiles.add('all');
    document.querySelectorAll('.bkl-pf-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  } else {
    activeBklProfiles.delete('all');
    document.querySelector('.bkl-pf-btn[data-profile="all"]')?.classList.remove('active');

    if(activeBklProfiles.has(profile)){
      activeBklProfiles.delete(profile);
      el.classList.remove('active');
      if(activeBklProfiles.size === 0){
        activeBklProfiles.add('all');
        document.querySelector('.bkl-pf-btn[data-profile="all"]')?.classList.add('active');
      }
    } else {
      activeBklProfiles.add(profile);
      el.classList.add('active');
    }
  }

  const activePanel = document.querySelector('.bkl-panel.active');
  if(!activePanel) return;
  const type = activePanel.id.replace('bkl-panel-','');
  ['chart-bkl-'+type, 'chart-bkl-'+type+'-total'].forEach(cid => {
    if(chartInstances[cid]){ chartInstances[cid].destroy(); delete chartInstances[cid]; }
  });
  buildBklPanel(type);
}

function bklTab(id, el){
  document.querySelectorAll('.bkl-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.bkl-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('bkl-panel-'+id).classList.add('active');
  // Destroy all bkl charts then rebuild for active panel
  ['received','packed','eha'].forEach(t => {
    ['chart-bkl-'+t, 'chart-bkl-'+t+'-total'].forEach(cid => {
      if(chartInstances[cid]){ chartInstances[cid].destroy(); delete chartInstances[cid]; }
    });
  });
  // Rebuild panel with current multi-select state preserved
  buildBklPanel(id);
}

function buildBklPanel(type){
  const data = BKL_DATA[type];
  const container = document.getElementById('bkl-cards-'+type);
  if(!container) return;

  // Apply profile filter (multi-select)
  const filteredProfiles = activeBklProfiles.has('all')
    ? PROFILES
    : PROFILES.filter(p => activeBklProfiles.has(p.key));

  const totalAll  = PROFILES.reduce((s,p)=>s+(data[p.key]?.total||0),0);
  const totalMeta = PROFILES.reduce((s,p)=>s+(data[p.key]?.meta||0),0);
  const totalPct  = Math.round((totalAll/Math.max(totalMeta,1))*100);
  const totalDelta = rnd(-10,15,1)[0];

  // ── Card de total (primeiro item do grid, mesma linha dos perfis) ──
  const totalCard = `
    <div class="bkl-card" style="background:linear-gradient(135deg,var(--surface) 0%,rgba(238,77,45,.06) 100%);border-color:rgba(238,77,45,.25)">
      <div class="bkl-card-label">Total Geral</div>
      <div class="bkl-card-name">Backlog ${type.charAt(0).toUpperCase()+type.slice(1)}</div>
      <div class="bkl-card-value" style="color:var(--orange)">${totalAll.toLocaleString('pt-BR')}</div>
      <div class="bkl-card-unit">todos os perfis</div>
      <div class="bkl-card-delta ${totalDelta>=0?'up':'down'}">
        <i class="fas fa-arrow-trend-${totalDelta>=0?'up':'down'}"></i>
        ${totalDelta>0?'+':''}${totalDelta}% vs hora ant.
      </div>
      <div class="bkl-card-bar-bg" style="margin-top:4px">
        <div class="bkl-card-bar-fill" style="width:${Math.min(totalPct,100)}%;background:var(--orange)"></div>
      </div>
      <div class="bkl-card-meta">
        <span>Meta: ${totalMeta.toLocaleString('pt-BR')}</span>
        <span>${totalPct}% meta</span>
      </div>
    </div>`;

  // ── Cards por perfil ──
  container.innerHTML = totalCard + filteredProfiles.map(p=>{
    const d = data[p.key];
    const pct = Math.round((d.total/Math.max(d.meta,1))*100);
    const share = Math.round((d.total/Math.max(totalAll,1))*100);
    const delta = rnd(-15,20,1)[0];
    const trend = delta>=0?'up':'down';
    return `
    <div class="bkl-card ${p.cls}">
      <div class="bkl-card-icon"><i class="fas ${p.icon}"></i></div>
      <div class="bkl-card-label">Perfil</div>
      <div class="bkl-card-name">${p.label} — ${p.name}</div>
      <div class="bkl-card-value">${d.total.toLocaleString('pt-BR')}</div>
      <div class="bkl-card-unit">pacotes em backlog</div>
      <div class="bkl-card-delta ${trend}">
        <i class="fas fa-arrow-trend-${trend}"></i>
        ${delta>0?'+':''}${delta}% vs hora anterior
      </div>
      <div class="bkl-card-bar-bg">
        <div class="bkl-card-bar-fill" style="width:${Math.min(pct,100)}%"></div>
      </div>
      <div class="bkl-card-meta">
        <span>Meta: ${d.meta.toLocaleString('pt-BR')}</span>
        <span>${share}% do total · ${pct}% da meta</span>
      </div>
    </div>`;
  }).join('');

  buildBklChart(type, filteredProfiles);
}

function buildBklChart(type, visibleProfiles){
  const data = BKL_DATA[type];
  const profs = visibleProfiles || PROFILES;
  const d = cd();

  // Shared datalabels config (inline numbers on points)
  const lineOpts = (extra={}) => ({
    responsive:true, maintainAspectRatio:false,
    plugins:{
      ...d.plugins,
      datalabels: false, // Chart.js built-in won't handle this; use custom plugin below
    },
    scales: d.scales,
    ...extra
  });

  // ── Chart 1: por perfil ──
  const cid1 = 'chart-bkl-'+type;
  if(chartInstances[cid1]){ chartInstances[cid1].destroy(); delete chartInstances[cid1]; }
  const c1 = document.getElementById(cid1); if(!c1) return;

  chartInstances[cid1] = new Chart(c1, {
    type:'line',
    data:{
      labels: BKL_HOURS,
      datasets: profs.map(p=>({
        label: `${p.label} — ${p.name}`,
        data: data[p.key].hourly,
        borderColor: PROFILE_COLORS[p.key],
        backgroundColor: PROFILE_COLORS[p.key]+'18',
        fill: false,
        tension: .4,
        pointRadius: 4,
        pointHoverRadius: 7,
        pointBackgroundColor: PROFILE_COLORS[p.key],
      }))
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        ...d.plugins,
        tooltip:{
          ...d.plugins.tooltip,
          callbacks:{
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString('pt-BR')} pkgs`
          }
        }
      },
      scales: d.scales,
      // Inline numbers on each point via afterDraw plugin
      animation:{ onComplete: () => drawLineLabels(chartInstances[cid1]) },
    }
  });

  // ── Chart 2: total (soma de todos os perfis por hora) ──
  const cid2 = 'chart-bkl-'+type+'-total';
  if(chartInstances[cid2]){ chartInstances[cid2].destroy(); delete chartInstances[cid2]; }
  const c2 = document.getElementById(cid2); if(!c2) return;

  const totalHourly = BKL_HOURS.map((_,i) => profs.reduce((s,p)=> s+(data[p.key].hourly[i]||0), 0));

  chartInstances[cid2] = new Chart(c2, {
    type:'line',
    data:{
      labels: BKL_HOURS,
      datasets:[{
        label:'Total Backlog',
        data: totalHourly,
        borderColor: var_orange(),
        backgroundColor: var_orange()+'22',
        fill: true,
        tension: .4,
        pointRadius: 4,
        pointHoverRadius: 7,
        pointBackgroundColor: var_orange(),
        borderWidth: 2.5,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        ...d.plugins,
        tooltip:{
          ...d.plugins.tooltip,
          callbacks:{
            label: ctx => ` Total: ${ctx.parsed.y.toLocaleString('pt-BR')} pkgs`
          }
        }
      },
      scales: d.scales,
      animation:{ onComplete: () => drawLineLabels(chartInstances[cid2]) },
    }
  });
}

  document.querySelectorAll('.cfg-tab').forEach(t => t.classList.remove('active'));

function renderUserGrids(){
  const isAdmin = currentUser && (currentUser.role === 'Administrador' || currentUser.role === 'Administradora');
  const sort = arr => [...arr].sort((a,b) => a.name.localeCompare(b.name, 'pt-BR'));
  renderGrid('grid-ativos',   sort(USERS.filter(u => u.active)),  isAdmin);
  renderGrid('grid-inativos', sort(USERS.filter(u => !u.active)), isAdmin);
  renderGrid('grid-todos',    sort(USERS),                         isAdmin);
}

function filterUserGrid(input, gridId){
  const q = input.value.toLowerCase().trim();
  const grid = document.getElementById(gridId);
  if(!grid) return;
  grid.querySelectorAll('.user-card').forEach(card => {
    const name  = card.querySelector('.user-card-name')?.textContent.toLowerCase() || '';
    const email = card.querySelector('.user-card-email')?.textContent.toLowerCase() || '';
    const role  = card.querySelector('.user-card-role')?.textContent.toLowerCase() || '';
    card.style.display = (!q || name.includes(q) || email.includes(q) || role.includes(q)) ? '' : 'none';
  });
}

function renderGrid(containerId, users, isAdmin){
  const el = document.getElementById(containerId);
  if(!el) return;
  if(!users.length){
    el.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:20px">Nenhum usuário encontrado.</div>';
    return;
  }
  el.innerHTML = users.map((u, idx) => {
    const globalIdx = USERS.indexOf(u);
    const statusPill = u.active
      ? '<span class="status-pill active-pill"><i class="fas fa-circle" style="font-size:6px"></i> Ativo</span>'
      : '<span class="status-pill inactive-pill"><i class="fas fa-circle" style="font-size:6px"></i> Inativo</span>';
    const toggleBtn = u.active
      ? `<button class="uca-btn" onclick="toggleUser(${globalIdx})" title="Desativar"><i class="fas fa-toggle-on"></i> Desativar</button>`
      : `<button class="uca-btn success" onclick="toggleUser(${globalIdx})" title="Ativar"><i class="fas fa-toggle-off"></i> Ativar</button>`;
    const deleteBtn = isAdmin && u.email !== 'admin@jarvis_rj2.com'
      ? `<button class="uca-btn danger" onclick="deleteUser(${globalIdx})" title="Excluir"><i class="fas fa-trash"></i></button>`
      : `<button class="uca-btn" style="opacity:.3;cursor:not-allowed" title="${u.email === 'admin@jarvis_rj2.com' ? 'Admin não pode ser excluído' : 'Somente admins podem excluir'}" disabled><i class="fas fa-lock"></i></button>`;
    return `
      <div class="user-card ${u.active ? '' : 'inactive'}" id="ucard-${globalIdx}">
        <div class="user-card-header">
          <div class="user-card-avatar">${u.initials}</div>
          <div class="user-card-info">
            <div class="user-card-name">${u.name}</div>
            <div class="user-card-role">${u.role} ${statusPill}</div>
          </div>
        </div>
        <div class="user-card-email"><i class="fas fa-envelope" style="font-size:10px"></i> ${u.email}</div>
        <div class="user-card-meta"><i class="fas fa-user-gear" style="font-size:10px"></i> Criado por: <strong>${u.createdBy}</strong> em ${u.createdAt}</div>
        <div class="user-card-actions">
          ${toggleBtn}
          ${deleteBtn}
        </div>
      </div>`;
  }).join('');
}

function toggleUser(idx){
  const u = USERS[idx];
  if(!u) return;
  // Prevent deactivating own account
  if(currentUser && u.email === currentUser.email){
    showToast('Você não pode desativar sua própria conta.', true); return;
  }
  u.active = !u.active;
  renderUserGrids();
  showToast(u.active ? `✓ ${u.name} ativado(a) com sucesso.` : `${u.name} desativado(a).`, !u.active);
}

function deleteUser(idx){
  const u = USERS[idx];
  if(!u) return;
  const isAdmin = currentUser && (currentUser.role === 'Administrador' || currentUser.role === 'Administradora');
  if(!isAdmin){ showToast('Somente administradores podem excluir usuários.', true); return; }
  if(u.email === 'admin@jarvis_rj2.com'){ showToast('O usuário admin não pode ser excluído.', true); return; }
  if(currentUser && u.email === currentUser.email){ showToast('Você não pode excluir sua própria conta.', true); return; }
  // Confirm
  const card = document.getElementById('ucard-' + idx);
  if(card) card.style.outline = '2px solid var(--red)';
  const confirmed = confirm(`Excluir permanentemente o usuário "${u.name}" (${u.email})?\nEsta ação não pode ser desfeita.`);
  if(!confirmed){ if(card) card.style.outline = ''; return; }
  USERS.splice(idx, 1);
  renderUserGrids();
  showToast(`Usuário ${u.name} excluído.`, false);
}

function createUser(){
  const name     = document.getElementById('nu-name').value.trim();
  const email    = document.getElementById('nu-email').value.trim().toLowerCase();
  const password = document.getElementById('nu-password').value;
  const role     = document.getElementById('nu-role').value;
  const initials = document.getElementById('nu-initials').value.trim().toUpperCase() ||
                   name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  if(!name || !email || !password || !role){
    showToast('Preencha todos os campos obrigatórios.', true); return;
  }
  if(password.length < 6){
    showToast('A senha deve ter ao menos 6 caracteres.', true); return;
  }
  if(USERS.find(u => u.email === email)){
    showToast('Já existe um usuário com este e-mail.', true); return;
  }

  const today = new Date();
  const dateStr = String(today.getDate()).padStart(2,'0') + '/' +
                  String(today.getMonth()+1).padStart(2,'0') + '/' + today.getFullYear();
  USERS.push({
    email, password, name, initials, role,
    active: true,
    createdBy: currentUser ? currentUser.name : 'Sistema',
    createdAt: dateStr
  });
  clearNewUserForm();
  showToast('✓ Usuário ' + name + ' cadastrado com sucesso!');
  // Switch to Ativos tab
  const tabs = document.querySelectorAll('.cfg-tab');
  cfgTab('ativos', tabs[1]);
}

function currentShift(){

  if(h>=6&&h<14) return 'T1  ·  06:00 – 14:00';
  if(h>=14&&h<22) return 'T2  ·  14:00 – 22:00';
  return 'T3  ·  22:00 – 06:00';
}
function tickClock(){
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0');
  const mm=String(now.getMinutes()).padStart(2,'0');
  const ss=String(now.getSeconds()).padStart(2,'0');
  const dd=String(now.getDate()).padStart(2,'0');
  const mo=String(now.getMonth()+1).padStart(2,'0');
  const yyyy=now.getFullYear();
  const dias=['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
  const dia=dias[now.getDay()];
  const clk=document.getElementById('digital-clock');
  const dat=document.getElementById('digital-date');
  const shf=document.getElementById('digital-shift');
  if(clk) clk.textContent=hh+':'+mm+':'+ss;
  if(dat) dat.textContent=dia+'  '+dd+'/'+mo+'/'+yyyy;
  if(shf) shf.textContent=currentShift();
}

function buildPrintContent(section){
  let html = '';

  // KPI strip ou clst-summary-bar
  const kpiStrip = section.querySelector('.kpi-strip, .clst-summary-bar');
  if(kpiStrip){
    html += '<div class="kpi-row">';
    kpiStrip.querySelectorAll('.kpi-strip-item, .clst-summary-item').forEach(item => {
      const label = item.querySelector('.kpi-strip-label, .clst-summary-label')?.textContent || '';
      const val   = item.querySelector('.kpi-strip-value, .clst-summary-value')?.textContent || '';
      const delta = item.querySelector('.kpi-strip-delta')?.textContent?.trim() || '';
      html += `<div class="kpi-box"><div class="kpi-label">${label}</div><div class="kpi-val">${val}</div><div class="kpi-delta">${delta}</div></div>`;
    });
    html += '</div>';
  }

  // Tabelas
  section.querySelectorAll('table').forEach(table => {
    const card = table.closest('.table-card');
    const tableTitle = card?.querySelector('.table-toolbar-title')?.textContent || '';
    if(tableTitle) html += `<div style="font-size:11px;font-weight:700;margin:12px 0 6px">${tableTitle}</div>`;
    html += '<table>';
    const ths = table.querySelectorAll('thead th');
    if(ths.length) html += '<thead><tr>' + Array.from(ths).map(th => `<th>${th.textContent}</th>`).join('') + '</tr></thead>';
    html += '<tbody>';
    table.querySelectorAll('tbody tr:not(.empty-row)').forEach(row => {
      if(row.style.display === 'none') return;
      html += '<tr>' + Array.from(row.querySelectorAll('td')).map(td =>
        `<td>${td.querySelector('.badge') ? `<span class="badge">${td.textContent.trim()}</span>` : td.textContent.trim()}</td>`
      ).join('') + '</tr>';
    });
    html += '</tbody></table>';
  });

  return html || '<p style="color:#999;font-size:11px">Nenhum conteúdo tabular disponível para exportação.</p>';
}

function downloadCSV(sectionId){
  const section = document.getElementById('section-' + sectionId);
  if(!section){ showToast('Seção não encontrada.', true); return; }

  const title = section.querySelector('.section-title')?.textContent || sectionId;
  const tables = section.querySelectorAll('table');

  if(!tables.length){ showToast('Nenhuma tabela encontrada nesta seção.', true); return; }

  let csvContent = '';
  const BOM = '\uFEFF';

  tables.forEach((table, tIdx) => {
    const card = table.closest('.table-card');
    const tableTitle = card?.querySelector('.table-toolbar-title')?.textContent || ('Tabela ' + (tIdx+1));
    if(tIdx > 0) csvContent += '\n\n';
    csvContent += `# ${tableTitle}\n`;
    csvContent += `# Exportado em: ${new Date().toLocaleString('pt-BR')} | Usuário: ${typeof currentUser!=='undefined' && currentUser ? currentUser.name : '—'}\n`;
    const ths = table.querySelectorAll('thead th');
    if(ths.length) csvContent += Array.from(ths).map(th => csvEsc(th.textContent)).join(';') + '\n';
    table.querySelectorAll('tbody tr:not(.empty-row)').forEach(row => {
      if(row.style.display === 'none') return;
      const cells = Array.from(row.querySelectorAll('td')).map(td => csvEsc(td.textContent.trim()));
      csvContent += cells.join(';') + '\n';
    });
  });

  const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `jarvis_rj2_${sectionId}_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✓ CSV exportado com sucesso!');
}

function csvEsc(val){
  const s = String(val).replace(/"/g, '""');
  return /[;,\n\r"]/.test(s) ? `"${s}"` : s;

function renderFocalCards(){
  const grid = document.getElementById('focal-grid');
  if(!grid) return;
  grid.innerHTML = focalCards.map((fc, i) => `
    <div class="focal-card">
      <div class="focal-area">${fc.area}</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <div id="fc-av-${i}" onclick="triggerFocalPhoto(${i})"
          style="width:52px;height:52px;border-radius:50%;flex-shrink:0;background:${fc.photo?'transparent':'linear-gradient(135deg,var(--orange),#ff8c00)'};
            color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;
            cursor:pointer;overflow:hidden;border:2px solid var(--border);transition:border-color .2s"
          title="Clique para adicionar foto">
          ${fc.photo ? `<img src="${fc.photo}" style="width:100%;height:100%;object-fit:cover"/>` : (fc.name ? fc.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() : '?')}
        </div>
        <input type="file" accept="image/*" id="fc-file-${i}" style="display:none" onchange="loadFocalPhoto(${i},this)"/>
        <input class="focal-contact-field" value="${fc.name}" placeholder="Nome do PIC…"
          oninput="focalCards[${i}].name=this.value;updateFocalAvatar(${i})"
          style="flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:4px;padding:6px 8px;font-size:12px;color:var(--text);outline:none;font-family:inherit"/>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <i class="fas fa-comment" style="color:var(--orange);font-size:12px"></i>
        <input class="focal-contact-field" value="${fc.seatalk}" placeholder="SeaTalk ID…"
          oninput="focalCards[${i}].seatalk=this.value"
          style="flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-size:11px;color:var(--text);outline:none;font-family:inherit"/>
      </div>
    </div>`).join('');
}

function triggerFocalPhoto(i){ document.getElementById('fc-file-'+i)?.click(); }

function loadFocalPhoto(i, input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    focalCards[i].photo = e.target.result;
    renderFocalCards();
  };
  reader.readAsDataURL(file);
}

function updateFocalAvatar(i){
  const fc = focalCards[i];
  const av = document.getElementById('fc-av-'+i);
  if(!av || fc.photo) return;
  av.textContent = fc.name ? fc.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() : '?';
}

function addFocalCard(){
  const area = prompt('Nome da área / ponto focal:');
  if(!area) return;
  focalCards.push({ area, name:'', seatalk:'', photo:'' });
  renderFocalCards();
}

function confirmAddTool(){
  const name  = document.getElementById('tool-name').value.trim();
  const desc  = document.getElementById('tool-desc').value.trim();
  const owner = document.getElementById('tool-owner').value.trim();
  const link  = document.getElementById('tool-link').value.trim();
  const ttype = _toolType || 'Web';
  if(!name){ showToast('Informe o nome da ferramenta.', true); return; }

  const THUMB_CLS  = { Dashboard:'thumb-dashboard', Sheets:'thumb-sheets', Web:'thumb-web' };
  const BADGE_CLS  = { Dashboard:'type-badge-dashboard', Sheets:'type-badge-sheets', Web:'type-badge-web' };
  const TYPE_ICONS = { Dashboard:'fa-gauge-high', Sheets:'fa-table', Web:'fa-globe' };
  const thumbCls  = THUMB_CLS[ttype]  || 'thumb-default';
  const badgeCls  = BADGE_CLS[ttype]  || 'type-badge-web';
  const tIconName = TYPE_ICONS[ttype] || 'fa-globe';
  const typeBadge = `<span class="${badgeCls}" style="font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:4px"><i class="fas ${tIconName}" style="font-size:8px"></i>${ttype}</span>`;
  const ownerHTML = owner ? `<div class="tool-card-owner"><i class="fas fa-user" style="font-size:9px"></i><span>${owner}</span></div>` : '';

  const grid = document.querySelector('.tools-grid');
  const addBtn = grid.lastElementChild;
  const card = document.createElement('a');
  card.className = 'tool-card';
  card.href = link || '#';
  if(link) card.target = '_blank';
  card.innerHTML = `
    <div class="tool-card-thumb ${thumbCls}">
      ${_toolImgData ? `<img src="${_toolImgData}" alt="${name}"/>` : `<i class="fas fa-link tool-icon"></i>`}
    </div>
    <div class="tool-card-body">
      <div class="tool-card-name">${name}</div>
      ${desc ? `<div class="tool-card-desc">${desc}</div>` : ''}
      <div class="tool-card-footer">
        ${ownerHTML}
        <div class="tool-card-link">
          <span style="display:flex;align-items:center;gap:4px"><i class="fas fa-arrow-up-right-from-square"></i> Acessar</span>
          ${typeBadge}
        </div>
      </div>
    </div>`;
  grid.insertBefore(card, addBtn);

let _dataDeleteMode = false;

function toggleDataDeleteMode(){
  _dataDeleteMode = !_dataDeleteMode;
  const btn = document.getElementById('btn-delete-entry');
  if(btn){
    btn.style.background = _dataDeleteMode ? 'rgba(239,68,68,.12)' : '';
    btn.innerHTML = _dataDeleteMode
      ? '<i class="fas fa-xmark"></i> Cancelar Exclusão'
      : '<i class="fas fa-trash-can"></i> Excluir Entrada';
  }
  buildDataMap(activeDataFilters);
  if(_dataDeleteMode) showToast('Modo exclusão ativo — clique em uma entrada para removê-la.', true);
}

function deleteDataEntry(i){
  if(!_dataDeleteMode) return;
  if(!confirm(`Remover "${dataMapEntries[i]?.name}"?`)) return;
  dataMapEntries.splice(i, 1);
  buildDataMap(activeDataFilters);
  showToast('Entrada removida.');
  if(!dataMapEntries.length){ _dataDeleteMode = false; toggleDataDeleteMode(); }
}

function renderMapaDados(){
  // Show delete button only for admin
  const btn = document.getElementById('btn-delete-entry');
  if(btn) btn.style.display = currentUser?.role === 'Administrador' ? '' : 'none';
  buildDataMap(activeDataFilters);
}

// State: set of active data map filters
const activeDataFilters = new Set(['all']);

function filterDataMap(type, el){
  if(type === 'all'){
    // "Todos" resets everything
    activeDataFilters.clear();
    activeDataFilters.add('all');
    document.querySelectorAll('#datamap-filters .bkl-pf-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  } else {
    // Remove "Todos" if selecting a specific type
    activeDataFilters.delete('all');
    document.querySelector('#datamap-filters .bkl-pf-btn:first-child')?.classList.remove('active');

    if(activeDataFilters.has(type)){
      // Deselect if already active
      activeDataFilters.delete(type);
      el.classList.remove('active');
      // If nothing selected, revert to "Todos"
      if(activeDataFilters.size === 0){
        activeDataFilters.add('all');
        document.querySelector('#datamap-filters .bkl-pf-btn:first-child')?.classList.add('active');
      }
    } else {
      activeDataFilters.add(type);
      el.classList.add('active');
    }
  }
  buildDataMap(activeDataFilters);
}

function buildDataMap(filter){
  const grid = document.getElementById('data-map-grid');
  if(!grid) return;
  const filterSet = filter instanceof Set ? filter : new Set([filter]);
  const entries = filterSet.has('all') ? dataMapEntries : dataMapEntries.filter(e => filterSet.has(e.type));
  const typeIcons  = { sql:'fa-database', py:'fa-code', link:'fa-link', sheet:'fa-table' };
  const typeLabels = { sql:'SQL', py:'Python', link:'Link', sheet:'Planilha' };

  grid.innerHTML = entries.map((e, i) => {
    // Find real index in dataMapEntries for delete
    const realIdx = dataMapEntries.indexOf(e);
    const deleteOverlay = _dataDeleteMode ? `
      <div onclick="deleteDataEntry(${realIdx})"
        style="position:absolute;inset:0;background:rgba(239,68,68,.08);border:2px dashed #ef4444;
               border-radius:inherit;display:flex;align-items:center;justify-content:center;
               cursor:pointer;z-index:10;transition:background .2s"
        onmouseover="this.style.background='rgba(239,68,68,.18)'"
        onmouseout="this.style.background='rgba(239,68,68,.08)'">
        <div style="text-align:center;color:#ef4444;pointer-events:none">
          <i class="fas fa-trash-can" style="font-size:22px;display:block;margin-bottom:4px"></i>
          <span style="font-size:11px;font-weight:700">Remover</span>
        </div>
      </div>` : '';

    return `
    <div class="data-card" data-type="${e.type}" style="position:relative">
      ${deleteOverlay}
      <span class="data-card-type ${e.type}"><i class="fas ${typeIcons[e.type]}"></i> ${typeLabels[e.type]}</span>
      <div class="data-card-name">${e.name}</div>
      <div class="data-card-desc">${e.desc}</div>
      ${e.code ? `<div class="data-card-code">${e.code}</div>` : ''}
      ${e.link
        ? `<a class="data-card-link" href="${e.link}" target="_blank"><i class="fas fa-arrow-up-right-from-square"></i> Abrir link</a>`
        : `<input class="data-card-input" placeholder="Cole o link aqui…" value="${e.link||''}"
             onchange="dataMapEntries.find(x=>x.name==='${e.name.replace(/'/g,"\\'")}')&&(dataMapEntries.find(x=>x.name==='${e.name.replace(/'/g,"\\'")}').link=this.value)"/>`
      }
    </div>`;
  }).join('');
}

function updateDataTypeUI(type){
  const codeGroup = document.getElementById('de-code-group');
  const codeLabel = document.getElementById('de-code-label');
  const codeTxt   = document.getElementById('de-code');
  const linkGroup = document.getElementById('de-link-group');
  const linkLabel = document.getElementById('de-link-label');

  if(type === 'sql'){
    // SQL: código obrigatório + link opcional
    codeGroup.style.display = '';
    codeLabel.innerHTML = 'Código SQL <span style="color:var(--red)">*</span>';
    codeTxt.placeholder = 'SELECT kpi_label, valor\nFROM tb_kpis\nWHERE data = CURDATE();';
    linkGroup.style.display = '';
    linkLabel.textContent = 'Link (opcional)';
    document.getElementById('de-link').placeholder = 'https://… (opcional)';

  } else if(type === 'py'){
    // Python: código opcional + link obrigatório (GitHub)
    codeGroup.style.display = '';
    codeLabel.innerHTML = 'Snippet de código <span style="color:var(--text-muted);font-weight:400;font-size:10px">(opcional)</span>';
    codeTxt.placeholder = '# Cole um trecho do script aqui…';
    linkGroup.style.display = '';
    linkLabel.innerHTML = 'Link GitHub <span style="color:var(--red)">*</span>';
    document.getElementById('de-link').placeholder = 'https://github.com/…';

  } else {
    // Link / Planilha: só link obrigatório, sem código
    codeGroup.style.display = 'none';
    linkGroup.style.display = '';
    linkLabel.innerHTML = 'Link <span style="color:var(--red)">*</span>';
    document.getElementById('de-link').placeholder = type === 'sheet'
      ? 'https://docs.google.com/spreadsheets/…'
      : 'https://…';
  }
}

function confirmDataEntry(){
  const type = _currentDataType;
  const name = document.getElementById('de-name').value.trim();
  const desc = document.getElementById('de-desc').value.trim();
  const code = document.getElementById('de-code').value.trim();
  const link = document.getElementById('de-link').value.trim();

  if(!name){ showToast('Informe o título da entrada.', true); return; }
  if(type === 'sql' && !code){ showToast('O código SQL é obrigatório.', true); return; }
  if(type === 'py' && !link){ showToast('Informe o link do repositório GitHub.', true); return; }
  if((type === 'link' || type === 'sheet') && !link){ showToast('Informe o link.', true); return; }

  dataMapEntries.unshift({ type, name, desc, code, link });
  document.getElementById('data-entry-modal').classList.remove('open');
  buildDataMap(activeDataFilters);
  showToast('✓ Entrada adicionada!');
}

function setJornalDates(){
  const now = new Date();
  const week = getWeekNumber(now);
  const el = document.getElementById('jornal-edition');
  if(el) el.textContent = `Edição Semana ${week} · ${now.getFullYear()}`;
  const meta = document.getElementById('jornal-date-meta');
  if(meta) meta.textContent = `Publicado em ${now.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long', year:'numeric'})} · COP RJ2 2026`;
  const bdayLabel = document.getElementById('bday-week-label');
  if(bdayLabel) bdayLabel.textContent = `Semana ${week} · ${now.toLocaleDateString('pt-BR', {month:'long', year:'numeric'})}`;
}

function getWeekNumber(d){
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('jarvis-theme', next); } catch(e){}
  // Update label
  const lbl = document.querySelector('.theme-switch-label');
  if(lbl) lbl.textContent = next === 'dark' ? 'Tema Claro' : 'Tema Escuro';
}

// Restore saved theme on load
(function(){
  try {
    const saved = localStorage.getItem('jarvis-theme');
    if(saved){
      document.documentElement.setAttribute('data-theme', saved);
      // Label will be updated after DOM loads
      window.addEventListener('DOMContentLoaded', () => {
        const lbl = document.querySelector('.theme-switch-label');
        if(lbl) lbl.textContent = saved === 'dark' ? 'Tema Claro' : 'Tema Escuro';
      });
    }
  } catch(e){}
})();
