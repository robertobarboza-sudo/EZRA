<style>
    /* ── TOKENS ─────────────────────────────────────────────── */
    :root {
      --bg:          #1a1d2e;
      --surface:     #232537;
      --surface-2:   #2a2d42;
      --surface-3:   #313452;
      --border:      rgba(255,255,255,.06);
      --text:        #e8eaf0;
      --text-sub:    #9497b0;
      --text-muted:  #5c5f7a;

      --orange:      #ee4d2d;
      --orange-l:    #ff6633;
      --orange-ll:   #ff8c5a;
      --cyan:        #06b6d4;
      --cyan-l:      #22d3ee;
      --green:       #10b981;
      --amber:       #f59e0b;
      --red:         #ef4444;

      --sidebar-w:   230px;
      --sidebar-col: 60px;
      --header-h:    64px;
      --radius:      10px;
      --radius-lg:   14px;
      --radius-xl:   20px;
      --transition:  .2s cubic-bezier(.4,0,.2,1);
      --shadow:      0 2px 8px rgba(0,0,0,.35);
      --shadow-lg:   0 8px 32px rgba(0,0,0,.45);
    }


    /* ── LIGHT THEME ────────────────────────────────────────── */
    [data-theme="light"] {
      --bg:          #f0f2f8;
      --surface:     #ffffff;
      --surface-2:   #f5f6fa;
      --surface-3:   #e8eaf0;
      --border:      rgba(0,0,0,.08);
      --text:        #1a1d2e;
      --text-sub:    #4a4d6a;
      --text-muted:  #8890b0;
      --shadow:      0 2px 8px rgba(0,0,0,.08);
      --shadow-lg:   0 8px 32px rgba(0,0,0,.12);
    }

    /* Sidebar light theme */
    [data-theme="light"] #sidebar          { background: #f8f9fc; border-right: 1px solid rgba(0,0,0,.08); }
    [data-theme="light"] .sidebar-logo     { border-bottom-color: rgba(0,0,0,.08); }
    [data-theme="light"] .sidebar-footer   { border-top-color: rgba(0,0,0,.08); }
    [data-theme="light"] .nav-group-label  { color: #b0b8d0; }
    [data-theme="light"] .nav-item         { color: #6b7299; }
    [data-theme="light"] .nav-item:hover   { background: rgba(238,77,45,.06); color: var(--orange); }
    [data-theme="light"] .nav-item.active  {
      background: linear-gradient(90deg, rgba(238,77,45,.12), rgba(238,77,45,.04));
      color: var(--orange);
    }
    [data-theme="light"] .nav-item.active::before { background: var(--orange); }
    [data-theme="light"] .logo-text        {
      background: linear-gradient(90deg, #1a1d2e 40%, var(--orange));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    [data-theme="light"] .logo-mark        { box-shadow: 0 4px 12px rgba(238,77,45,.3); }
    [data-theme="light"] .theme-switch     { color: #6b7299; }
    [data-theme="light"] .theme-switch:hover { background: rgba(238,77,45,.06); color: var(--orange); }
    [data-theme="light"] #sidebar.collapsed .nav-item::after { background: #fff; color: #1a1d2e; border: 1px solid rgba(0,0,0,.08); }

    /* Header light */
    [data-theme="light"] #header { background: #fff; border-bottom-color: rgba(0,0,0,.08); }

    /* Other light adjustments */
    [data-theme="light"] .digital-clock { text-shadow: 0 0 12px rgba(238,77,45,.4); }
    [data-theme="light"] input.filter-select::-webkit-calendar-picker-indicator { filter: none; opacity:.6; }
    [data-theme="light"] .clst-table-wrap { box-shadow: 0 2px 8px rgba(0,0,0,.08); }

    /* Theme switch item */
    .theme-switch {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: var(--radius);
      margin: 2px 8px; cursor: pointer;
      color: #94a3b8;
      transition: background var(--transition), color var(--transition);
      white-space: nowrap; overflow: hidden;
    }
    .theme-switch:hover { background: rgba(255,255,255,.07); color: #f1f5f9; }
    .theme-switch .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
    .theme-switch-label {
      font-size: 14px; font-weight: 500;
      opacity: 1; transition: opacity var(--transition);
    }
    #sidebar.collapsed .theme-switch-label { opacity: 0; width: 0; }
    #sidebar.collapsed .theme-switch { justify-content: center; }

    /* ── RESET ───────────────────────────────────────────────── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;overflow:hidden;
      -webkit-tap-highlight-color:transparent; /* remove flash on tap mobile */
    }
    a{text-decoration:none;color:inherit}
    ul,ol{list-style:none}
    button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit;
      touch-action:manipulation; /* faster tap, no 300ms delay */
    }
    input,select,textarea{font-family:inherit}
    /* Larger tap targets for interactive elements on mobile */
    .nav-item, .bkl-tab, .jornal-tab, .audit-tab, .cfg-tab, .gov-section-title {
      -webkit-tap-highlight-color:rgba(238,77,45,.08);
    }
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:3px}

    /* ── SIDEBAR ─────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      position: fixed;
      top:0;left:0;bottom:0;
      z-index: 200;
      transition: width var(--transition);
      overflow: hidden;
    }
    #sidebar.collapsed { width: var(--sidebar-col); }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px 16px;
      min-height: var(--header-h);
    }
    .logo-mark {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #ee4d2d, #ff8c00);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #fff; flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(238,77,45,.4);
    }
    .logo-text {
      font-size: 15px; font-weight: 700;
      background: linear-gradient(90deg, #fff 60%, #ff8c5a);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      white-space: nowrap; overflow: hidden;
      opacity: 1; transition: opacity var(--transition);
    }
    #sidebar.collapsed .logo-text { opacity: 0; width: 0; }

    /* Nav */
    .sidebar-nav { flex:1; overflow-y:auto; padding: 8px 10px; }
    .nav-group { margin-bottom: 18px; }
    .nav-group-label {
      font-size: 9.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--text-muted);
      padding: 6px 8px 4px;
      white-space: nowrap; overflow: hidden;
      opacity: 1; transition: opacity var(--transition);
    }
    #sidebar.collapsed .nav-group-label { opacity: 0; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius);
      margin-bottom: 2px;
      color: var(--text-sub);
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      position: relative; white-space: nowrap; overflow: hidden;
    }
    .nav-item:hover { background: var(--surface-2); color: var(--text); }
    .nav-item.active {
      background: linear-gradient(90deg, rgba(238,77,45,.2), rgba(238,77,45,.06));
      color: var(--orange-ll);
    }
    .nav-item.active::before {
      content: '';
      position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 3px; border-radius: 0 3px 3px 0;
      background: var(--orange-l);
    }

    .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
    .nav-label { font-size: 13px; font-weight: 500; opacity:1; transition: opacity var(--transition); }
    #sidebar.collapsed .nav-label { opacity: 0; width: 0; }

    /* Composite emoji icons */
    .nav-icon-composite { position: relative; width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .nav-icon-composite .icon-base { font-size: 14px; line-height: 1; text-align: center; }
    .nav-icon-composite .icon-badge {
      position: absolute; bottom: -3px; right: -6px;
      font-size: 7px; font-weight: 800;
      background: var(--orange); color: #fff;
      border-radius: 3px; padding: 0 2px; line-height: 12px;
      letter-spacing: -.2px; border: 1px solid var(--surface);
    }
    .nav-item.active .nav-icon-composite .icon-badge { background: var(--orange-ll); }
    .nav-item:hover .nav-icon-composite .icon-badge { background: var(--orange-l); }

    /* Tooltip */
    #sidebar.collapsed .nav-item::after {
      content: attr(data-label);
      position: absolute; left: calc(var(--sidebar-col) + 8px);
      background: var(--surface-3); color: var(--text);
      padding: 5px 10px; border-radius: var(--radius);
      font-size: 12px; font-weight: 500;
      white-space: nowrap; opacity: 0; pointer-events: none;
      transition: opacity .15s; z-index: 300;
      box-shadow: var(--shadow);
    }
    #sidebar.collapsed .nav-item:hover::after { opacity: 1; }

    .sidebar-footer {
      padding: 10px;
      border-top: 1px solid var(--border);
    }

    /* ── MAIN LAYOUT ─────────────────────────────────────────── */
    #app {
      flex: 1;
      margin-left: var(--sidebar-w);
      display: flex; flex-direction: column;
      height: 100vh;
      overflow: hidden;
      transition: margin-left var(--transition);
    }
    #app.sidebar-collapsed { margin-left: var(--sidebar-col); }

    /* ── HEADER ──────────────────────────────────────────────── */
    #header {
      height: var(--header-h);
      background: var(--surface);
      display: flex; align-items: center;
      padding: 0 24px; gap: 14px;
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid var(--border);
    }

    /* ── MOBILE HEADER ─────────────────────────────────── */
    /* Mobile section title — hidden on desktop */
    .header-mobile-title {
      display: none;
      flex: 1;
      font-size: 15px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    @media(max-width:768px){
      #header { padding: 0 14px; gap: 10px; height: 52px; }

      /* Show only: hamburger + mobile title + avatar */
      .header-greeting    { display: none; }
      .digital-clock-wrap { display: none; }
      .header-filters     { display: none !important; }
      .action-btn         { display: none; } /* sync + notif hidden */
      .header-mobile-title { display: block; }

      /* Avatar stays, slightly bigger tap target */
      .user-avatar {
        width: 36px; height: 36px; font-size: 13px;
        min-width: 36px;
      }

      /* Header toggle bigger tap target */
      .header-toggle {
        width: 44px; height: 44px; font-size: 18px; flex-shrink: 0;
      }
    }

    .header-greeting { flex: 1; }
    .header-greeting .greet-line { font-size: 18px; font-weight: 300; color: var(--text-sub); }
    .header-greeting .greet-line strong { font-weight: 700; color: var(--text); }
    .greet-sub { display: none; } /* section breadcrumb — hidden on desktop */

    /* Filters */
    .header-filters { display: flex; gap: 8px; align-items: center; }
    .filter-select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-sub);
      padding: 6px 10px;
      border-radius: var(--radius);
      font-size: 12px; font-weight: 500;
      cursor: pointer; outline: none;
      transition: border-color var(--transition);
    }
    .filter-select:focus { border-color: var(--orange); color: var(--text); }
    input.filter-select::-webkit-calendar-picker-indicator { filter: invert(1) opacity(.6); cursor: pointer; }
    input.filter-select { font-family: inherit; }

    /* Actions */
    .header-actions { display: flex; align-items: center; gap: 6px; }
    .action-btn {
      position: relative; width: 34px; height: 34px;
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-sub); font-size: 14px;
      transition: background var(--transition), color var(--transition);
    }
    .action-btn:hover { background: var(--surface-2); color: var(--text); }
    .action-btn .notif-dot-badge {
      position: absolute; top: 5px; right: 5px;
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--red); border: 1.5px solid var(--surface);
    }

    .user-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, #ee4d2d, #ff8c00);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; cursor: pointer;
      box-shadow: 0 2px 8px rgba(238,77,45,.35);
    }

    .sync-icon { font-size: 13px; }
    .sync-icon.spinning { animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Notification dropdown */
    .notif-dropdown {
      position: absolute; top: calc(var(--header-h) + 4px); right: 56px;
      width: 310px; background: var(--surface-2);
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg); display: none; z-index: 500;
    }
    .notif-dropdown.open { display: block; }
    .notif-header {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      font-size: 13px; font-weight: 600;
      display: flex; justify-content: space-between; align-items: center;
    }
    .notif-mark-read {
      font-size: 11px; color: var(--orange-ll); cursor: pointer;
      transition: opacity .15s;
    }
    .notif-mark-read:hover { opacity: .75; }
    .notif-item {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-start; font-size: 12px;
      transition: background var(--transition);
    }
    .notif-item:hover { background: var(--surface-3); }
    .notif-item:last-child { border-bottom: none; }
    .notif-pip {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 3px;
    }
    .notif-pip.red    { background: var(--red); }
    .notif-pip.amber  { background: var(--amber); }
    .notif-pip.cyan   { background: var(--cyan); }
    .notif-title { font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .notif-sub { color: var(--text-muted); }

    /* ── CONTENT ─────────────────────────────────────────────── */
    #main-content { flex:1; overflow-y:auto; padding: 24px; }

    .section { display:none; animation: fadeUp .22s ease both; }
    .section.active { display: block; }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .section-header { margin-bottom: 20px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .section-header-left { flex: 1; min-width: 200px; }
    .section-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .section-subtitle {
      font-size: 12px; color: var(--text-muted);
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }

    /* ── DOWNLOAD BUTTONS (PDF / CSV) ─────────────────────────── */
    .section-dl-group { display: flex; gap: 8px; align-items: center; flex-shrink: 0; padding-top: 2px; }
    .dl-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: var(--radius);
      font-size: 11px; font-weight: 700; cursor: pointer;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-sub); font-family: inherit;
      transition: all var(--transition); letter-spacing: .03em;
    }
    .dl-btn:hover { transform: translateY(-1px); }
    .dl-btn-pdf {
      border-color: rgba(238,77,45,.35);
      color: var(--orange);
      background: rgba(238,77,45,.06);
    }
    .dl-btn-pdf:hover { background: rgba(238,77,45,.14); border-color: var(--orange); box-shadow: 0 2px 8px rgba(238,77,45,.2); }
    .dl-btn-csv {
      border-color: rgba(16,185,129,.35);
      color: #34d399;
      background: rgba(16,185,129,.06);
    }
    .dl-btn-csv:hover { background: rgba(16,185,129,.14); border-color: #10b981; box-shadow: 0 2px 8px rgba(16,185,129,.2); }

    /* PDF dropdown */
    .pdf-menu-wrap { position: relative; display: inline-flex; }
    .pdf-dropdown {
      display: none; position: absolute; top: calc(100% + 6px); right: 0;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
      min-width: 170px; z-index: 600; overflow: hidden;
    }
    .pdf-dropdown.open { display: block; }
    .pdf-dropdown-item {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 14px; font-size: 12px; font-weight: 600;
      color: var(--text-sub); cursor: pointer;
      transition: background var(--transition), color var(--transition);
      border: none; background: none; width: 100%; text-align: left;
      font-family: inherit;
    }
    .pdf-dropdown-item:hover { background: var(--surface-3); color: var(--orange); }
    .pdf-dropdown-item i { font-size: 13px; color: var(--orange); width: 16px; text-align: center; }
    .pdf-dropdown-label {
      padding: 6px 14px 4px; font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em; color: var(--text-muted);
    }

    /* ── DATA SOURCE BADGE ───────────────────────────────────── */
    .ds-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 8px; border-radius: 20px;
      font-size: 10px; font-weight: 700; letter-spacing: .04em;
    }
    .ds-badge.ok     { background: rgba(16,185,129,.15); color: #34d399; }
    .ds-badge.loading{ background: rgba(245,158,11,.12);  color: #fbbf24; }
    .ds-badge.error  { background: rgba(239,68,68,.12);   color: #f87171; }

    /* ── KPI STRIP (horizontal inline like the reference) ────── */
    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .kpi-strip-item {
      background: var(--surface);
      padding: 18px 20px;
      position: relative;
      transition: background var(--transition);
    }
    .kpi-strip-item:hover { background: var(--surface-2); }
    .kpi-strip-label {
      font-size: 11px; font-weight: 500; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px;
    }
    .kpi-strip-value {
      font-size: 26px; font-weight: 700; color: var(--text);
      line-height: 1; margin-bottom: 6px;
    }
    .kpi-strip-delta {
      font-size: 11px; font-weight: 600;
      display: flex; align-items: center; gap: 3px;
    }
    .kpi-strip-delta.up   { color: var(--green); }
    .kpi-strip-delta.down { color: var(--red); }
    .kpi-strip-icon {
      position: absolute; top: 16px; right: 16px;
      font-size: 20px; opacity: .08;
    }
    /* Accent top bar per card */
    .kpi-strip-item::after {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: var(--orange);
      opacity: 0; transition: opacity var(--transition);
    }
    .kpi-strip-item:hover::after { opacity: 1; }
    .kpi-strip-item.success::after { background: var(--green); opacity: 1; }
    .kpi-strip-item.warning::after { background: var(--amber); opacity: 1; }
    .kpi-strip-item.danger::after  { background: var(--red);   opacity: 1; }
    .kpi-strip-item.info::after    { background: var(--cyan);  opacity: 1; }

    /* ── SKELETON ────────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius);
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skeleton-strip { height: 100px; border-radius: var(--radius-lg); margin-bottom: 20px; }
    .skeleton-chart { border-radius: var(--radius-lg); }

    /* ── CHART GRID ──────────────────────────────────────────── */
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px; margin-bottom: 20px;
    }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .chart-card.full { grid-column: 1 / -1; }
    .chart-card.accent-orange {
      background: linear-gradient(135deg, #7f1d0d 0%, #991b1b 50%, #b91c1c 100%);
      border-color: rgba(255,102,51,.3);
    }

    .chart-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 16px;
    }
    .chart-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .chart-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .chart-body { position: relative; height: 220px; }
    .chart-body.tall { height: 260px; }

    /* ── TABLES ──────────────────────────────────────────────── */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px; margin-bottom: 20px;
      box-shadow: var(--shadow);
    }
    .table-toolbar {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 14px; gap: 12px; flex-wrap: wrap;
    }
    .table-toolbar-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .table-search {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 6px 10px;
      flex: 1; max-width: 260px;
      transition: border-color var(--transition);
    }
    .table-search:focus-within { border-color: var(--orange); }
    .table-search i { color: var(--text-muted); font-size: 12px; }
    .table-search input {
      background: transparent; border: none; outline: none;
      color: var(--text); font-size: 12px; width: 100%;
    }
    .table-search input::placeholder { color: var(--text-muted); }

    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    thead th {
      text-align: left; padding: 9px 12px;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
    }
    tbody td {
      padding: 11px 12px; border-bottom: 1px solid var(--border);
      color: var(--text); vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background var(--transition); }
    tbody tr:hover { background: var(--surface-2); }
    .empty-row td { text-align: center; color: var(--text-muted); padding: 32px; }

    /* ── BADGES ──────────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px; border-radius: 20px;
      font-size: 10.5px; font-weight: 700;
    }
    .badge-success { background: rgba(16,185,129,.15);  color: #34d399; }
    .badge-warning { background: rgba(245,158,11,.15);  color: #fbbf24; }
    .badge-danger  { background: rgba(239,68,68,.15);   color: #f87171; }
    .badge-info    { background: rgba(6,182,212,.15);   color: #22d3ee; }
    .badge-neutral { background: rgba(148,151,176,.12); color: #9497b0; }
    .badge-orange  { background: rgba(255,102,51,.15);  color: var(--orange-ll); }

    .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .status-dot.ok       { background: var(--green); }
    .status-dot.alert    { background: var(--amber); }
    .status-dot.critical { background: var(--red);   }
    .status-dot.offline  { background: var(--text-muted); }

    /* ── BUTTONS ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: var(--radius);
      font-size: 12px; font-weight: 600;
      transition: all var(--transition);
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: none; }
    .btn-primary {
      background: var(--orange); color: #fff;
      box-shadow: 0 4px 16px rgba(238,77,45,.4);
    }
    .btn-primary:hover { background: var(--orange-l); }
    .btn-outline {
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text-sub);
    }
    .btn-outline:hover { border-color: var(--orange); color: var(--orange-ll); }

    /* ── CONVEYOR GRID ───────────────────────────────────────── */
    .conveyor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 12px; margin-bottom: 20px;
    }
    .conveyor-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
      display: flex; flex-direction: column; gap: 8px;
      transition: background var(--transition), border-color var(--transition);
    }
    .conveyor-item:hover { background: var(--surface-2); border-color: var(--orange); }
    .conveyor-name { font-size: 12px; font-weight: 600; color: var(--text); }
    .conveyor-speed { font-size: 10.5px; color: var(--text-muted); }
    .conveyor-bar-bg { height: 5px; background: var(--surface-3); border-radius: 3px; overflow: hidden; }
    .conveyor-bar-fill { height: 100%; border-radius: 3px; transition: width .6s; }
    .conveyor-pct { font-size: 10px; color: var(--text-muted); text-align: right; }

    /* ── MODAL ───────────────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.65); backdrop-filter: blur(4px);
      z-index: 900; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 28px; width: 100%; max-width: 500px;
      box-shadow: var(--shadow-lg);
      animation: slideIn .22s ease;
    }
    @keyframes slideIn {
      from { transform: translateY(-16px); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }
    .modal-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 22px;
    }
    .modal-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .modal-close {
      width: 30px; height: 30px; border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); transition: background var(--transition);
    }
    .modal-close:hover { background: var(--surface-3); color: var(--text); }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 11px; font-weight: 600;
      color: var(--text-muted); margin-bottom: 5px; letter-spacing: .04em; }
    .form-input {
      width: 100%; background: var(--surface-3);
      border: 1px solid var(--border);
      border-radius: var(--radius); padding: 9px 12px;
      font-size: 13px; color: var(--text); outline: none;
      transition: border-color var(--transition);
    }
    .form-input:focus { border-color: var(--orange); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }

    /* ── MOBILE ──────────────────────────────────────────────── */
    #sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); z-index: 190;
    }

    /* ── RESPONSIVE ──────────────────────────────────────────── */
    @media(max-width:1100px){ .header-filters { display: none; } }
    @media(max-width:768px){
      #sidebar{ width: var(--sidebar-w) !important; left: calc(-1 * var(--sidebar-w)); }
      #sidebar.mobile-open { left: 0; }
      #sidebar-overlay { display: block; opacity: 0; pointer-events: none; transition: opacity var(--transition); }
      #sidebar-overlay.visible { opacity: 1; pointer-events: auto; }
      #app { margin-left: 0 !important; }

      /* KPI strip */
      .kpi-strip { grid-template-columns: 1fr 1fr; gap: 10px; }

      /* Charts */
      .chart-grid { grid-template-columns: 1fr; }
      .chart-body { height: 220px !important; }
      .chart-body.tall { height: 260px !important; }

      /* Content */
      #main-content { padding: 12px; }
      .form-row { grid-template-columns: 1fr; }
      .header-filters { display: none; }
      .header-greeting .greet-line { font-size: 15px; }

      /* Section header */
      .section-header { flex-direction: column; gap: 10px; align-items: flex-start; }
      .section-dl-group { align-self: flex-start; }
      .section-title { font-size: 17px; }

      /* Cards e grids */
      .tools-grid { grid-template-columns: 1fr 1fr !important; gap: 10px; }
      .user-grid  { grid-template-columns: 1fr !important; }
      .com-grid   { grid-template-columns: 1fr 1fr; }
      .meetings-grid { grid-template-columns: 1fr; }
      .focal-grid    { grid-template-columns: 1fr; }
      .data-map-grid { grid-template-columns: 1fr; }
      .campanha-grid { grid-template-columns: 1fr; }
      .bday-grid     { grid-template-columns: repeat(2, 1fr); }
      .resp-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

      /* Backlog — 2 colunas no mobile */
      .bkl-profiles { grid-template-columns: 1fr 1fr !important; }

      /* Score cards performance */
      #perf-score-grid { grid-template-columns: 1fr 1fr !important; }
      .perf-kpi-row { flex-direction: column; }
      .perf-kpi-divider { width: 100%; height: 1px; margin: 6px 0; }
      .perf-kpi-items { flex-wrap: wrap; }
      .perf-kpi-item { min-width: calc(50% - 8px); border-right: none !important; border-bottom: 1px solid var(--border); padding: 8px 0; }
      .perf-kpi-item:last-child { border-bottom: none; }

      /* Tabs — scroll horizontal */
      .bkl-tabs, .jornal-tabs, .audit-tabs, .cfg-tabs {
        overflow-x: auto; -webkit-overflow-scrolling: touch;
        scrollbar-width: none; width: 100%;
        border-radius: var(--radius-lg);
      }
      .bkl-tabs::-webkit-scrollbar, .jornal-tabs::-webkit-scrollbar,
      .audit-tabs::-webkit-scrollbar, .cfg-tabs::-webkit-scrollbar { display: none; }
      .bkl-tab, .jornal-tab, .audit-tab, .cfg-tab { white-space: nowrap; flex-shrink: 0; }

      /* Profile filter buttons — wrap */
      #bkl-profile-filter { flex-wrap: wrap; }
      .bkl-pf-btn { font-size: 11px; padding: 5px 10px; }

      /* Clusterização — scroll horizontal */
      .clst-table-wrap { max-height: 60vh; }

      /* Gov sections */
      .gov-sub-list { margin-left: 0; }
      .gov-sub-item { flex-direction: column; gap: 8px; }

      /* Login */
      .login-brand { display: none; }
      .login-form-wrap { padding: 28px 20px; }

      /* Modais — fullscreen no mobile */
      .modal { width: calc(100vw - 32px) !important; max-width: none !important; margin: 16px; max-height: 90vh; overflow-y: auto; }
      .modal-overlay { align-items: flex-end; padding: 0; }

      /* Botão hambúrguer já existe — garantir tamanho toque */
      .header-toggle { min-width: 44px; min-height: 44px; }

      /* Tabelas — scroll horizontal */
      .table-card { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      table { min-width: 500px; }

      /* Organograma */
      .org-all-shifts { grid-template-columns: 1fr !important; }
    }

    @media(max-width:480px){
      .kpi-strip { grid-template-columns: 1fr; }
      .tools-grid { grid-template-columns: 1fr !important; }
      .com-grid   { grid-template-columns: 1fr; }
      .bkl-profiles { grid-template-columns: 1fr !important; }
      #perf-score-grid { grid-template-columns: 1fr !important; }
      .bday-grid  { grid-template-columns: 1fr 1fr; }
      .section-title { font-size: 15px; }
      .digital-clock { font-size: 18px; }
    }


    .vehicle-waiting { background: rgba(245,158,11,.04); }

    /* ── LOGIN SCREEN ─────────────────────────────────────────── */
    #login-screen {
      position: fixed; inset: 0; z-index: 9000;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    #login-screen.hidden { display: none; }
    .login-wrap {
      display: flex; width: 100%; max-width: 900px;
      min-height: 520px; border-radius: var(--radius-xl);
      overflow: hidden; box-shadow: 0 24px 64px rgba(0,0,0,.6);
    }
    @media(max-width:768px){
      .login-wrap { max-width: 100%; min-height: auto; border-radius: var(--radius-lg); }
    }
    .login-brand {
      flex: 1;
      background: linear-gradient(145deg, #1a0a00 0%, #3d1400 40%, #7a2800 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 40px; gap: 20px;
      position: relative; overflow: hidden;
    }
    .login-brand::before {

    .login-brand-eye {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--orange), #ff8c00);

      font-size: 34px; color: #fff;
      animation: pulse-ring 2.8s ease infinite;
    }
    @keyframes pulse-ring {
      0%,100% { box-shadow: 0 0 0 12px rgba(238,77,45,.15), 0 0 0 26px rgba(238,77,45,.06); }
      50%      { box-shadow: 0 0 0 18px rgba(238,77,45,.10), 0 0 0 38px rgba(238,77,45,.03); }
    }
    .login-brand-name {
      font-size: 26px; font-weight: 800; color: #fff;
      letter-spacing: -.5px; text-align: center;
    }
    .login-brand-name span { color: var(--orange-ll); font-weight: 300; }
    .login-brand-sub {
      font-size: 12px; color: rgba(255,255,255,.4);
      text-align: center; line-height: 1.6; max-width: 220px;

    .login-brand-dots { display: flex; gap: 6px; margin-top: 8px; }
    .login-brand-dots b { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.2); display:inline-block; }
    .login-brand-dots b:nth-child(2) { background: var(--orange); }
    .login-form-panel {
      width: 380px; flex-shrink: 0;
      background: var(--surface);
      display: flex; flex-direction: column;
      justify-content: center; padding: 48px 40px;
    }
    .login-form-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .login-form-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 32px; }
    .login-field { margin-bottom: 16px; }
    .login-label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; letter-spacing: .04em; }
    .login-input-wrap { position: relative; }
    .login-input-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 13px; pointer-events: none; }
    .login-input {
      width: 100%; background: var(--surface-2);
      border: 1.5px solid var(--border); border-radius: var(--radius);

      font-size: 13px; color: var(--text); outline: none;
      transition: border-color var(--transition), background var(--transition);
    }
    .login-input:focus { border-color: var(--orange); background: var(--surface-3); }
    .login-input.input-error { border-color: #ef4444; }
    .pw-group {
      display: flex; align-items: stretch;
    }
    .login-pw-toggle {
      flex-shrink: 0;
      background: var(--surface-2);
      border: 1.5px solid var(--border);

    .login-error {

    .login-btn:active { transform: none; }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .login-footer {

    }
    .cfg-form-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .cfg-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .cfg-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .cfg-form-group { display: flex; flex-direction: column; gap: 5px; }
    .cfg-label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: .04em; }
    .cfg-input {
      background: var(--surface-2); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 9px 12px;
      font-size: 13px; color: var(--text); outline: none; font-family: inherit;
      transition: border-color var(--transition);
    }
    .cfg-input:focus { border-color: var(--orange); }
    .cfg-form-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }

    /* Admin lock banner */
    .admin-lock {
      display: flex; align-items: center; gap: 10px;
      background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2);
      border-radius: var(--radius); padding: 10px 14px;
      font-size: 12px; color: #f87171; margin-bottom: 16px;
    }
    .admin-lock i { font-size: 14px; flex-shrink: 0; }

    /* Status pill */
    .status-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700;
    }
    .status-pill.active-pill { background: rgba(16,185,129,.15); color: #34d399; }
    .status-pill.inactive-pill { background: rgba(148,151,176,.12); color: #9497b0; }

    @media(max-width:768px){
      .cfg-grid-2, .cfg-grid-3 { grid-template-columns: 1fr; }
      .user-grid { grid-template-columns: 1fr; }
    }

    /* ── AUDITORIA ───────────────────────────────────────────── */
    .audit-tabs {
      display: flex; gap: 2px; margin-bottom: 20px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 4px; width: fit-content;
      flex-wrap: wrap;
    }
    .audit-tab {
      padding: 7px 16px; border-radius: var(--radius);
      font-size: 12px; font-weight: 600;
      color: var(--text-muted); cursor: pointer;
      transition: all var(--transition);
      display: flex; align-items: center; gap: 6px;
    }
    .audit-tab.active { background: var(--orange); color: #fff; box-shadow: 0 2px 8px rgba(238,77,45,.35); }
    .audit-tab:not(.active):hover { background: var(--surface-2); color: var(--text); }
    .audit-panel { display: none; }
    .audit-panel.active { display: block; }

    /* Summary row */
    .audit-summary {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
      gap: 1px; background: var(--border);
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      overflow: hidden; margin-bottom: 20px;
    }
    .audit-stat {
      background: var(--surface); padding: 14px 16px;
      transition: background var(--transition);
    }
    .audit-stat:hover { background: var(--surface-2); }
    .audit-stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: 4px; }
    .audit-stat-value { font-size: 22px; font-weight: 800; color: var(--text); line-height: 1; margin-bottom: 4px; }
    .audit-stat-delta { font-size: 10.5px; font-weight: 600; display: flex; align-items: center; gap: 3px; }
    .audit-stat-delta.up   { color: var(--green); }
    .audit-stat-delta.down { color: var(--red); }
    .audit-stat-delta.warn { color: var(--amber); }
    .audit-stat-icon { position: absolute; top: 12px; right: 12px; font-size: 18px; opacity: .08; }
    .audit-stat { position: relative; }
    .audit-stat.a-success::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--green); }
    .audit-stat.a-warning::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--amber); }
    .audit-stat.a-danger::after  { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--red); }
    .audit-stat.a-info::after    { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--cyan); }

    /* New audit form */
    .audit-form-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px;
    }
    .audit-form-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .audit-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .audit-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }

    @media(max-width:768px){
      .audit-grid-3, .audit-grid-2 { grid-template-columns: 1fr; }
      .audit-tabs { width: 100%; }
      .audit-tab { flex: 1; justify-content: center; }
    }

    /* ── DIGITAL CLOCK ───────────────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    .digital-clock-wrap { display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0; }
    .digital-clock { font-family:'Share Tech Mono','Courier New',monospace;font-size:26px;font-weight:400;
      line-height:1;letter-spacing:.08em;color:var(--orange);
      text-shadow:0 0 12px rgba(238,77,45,.6),0 0 24px rgba(238,77,45,.25);user-select:none; }
    .digital-date { font-family:'Share Tech Mono','Courier New',monospace;font-size:12px;letter-spacing:.12em;
      color:var(--orange-ll);opacity:.65;text-shadow:0 0 8px rgba(238,77,45,.3);user-select:none; }
    .digital-shift { font-family:'Share Tech Mono','Courier New',monospace;font-size:11px;letter-spacing:.15em;
      text-transform:uppercase;color:var(--orange);opacity:.5;user-select:none; }
    @media(max-width:768px){ .digital-clock{font-size:20px} .digital-date{display:none} }

    /* ── CLUSTERIZAÇÃO ───────────────────────────────────────── */
    .clst-summary-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 1px; background: var(--border);
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      overflow: hidden; margin-bottom: 20px;
    }
    .clst-summary-item {
      background: var(--surface); padding: 10px 12px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .clst-summary-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .05em; color: var(--text-muted); white-space: nowrap;
    }
    .clst-summary-value {
      font-size: 16px; font-weight: 800; color: var(--text); line-height: 1.1;
    }
    .clst-summary-value.alert { color: var(--red); }
    .clst-summary-value.ok { color: #10b981; }
    .clst-summary-value.accent { color: var(--orange); }

    /* Scroll wrapper */
    .clst-table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: auto;
      max-height: 72vh; position: relative;
      box-shadow: var(--shadow);
    }
    .clst-table {
      border-collapse: separate; border-spacing: 0;
      font-size: 10.5px; min-width: 1400px;
    }
    .clst-table th, .clst-table td {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 4px 6px; text-align: center; white-space: nowrap;
      color: var(--text);
    }
    .clst-table th { background: var(--surface-2); font-weight: 700; }

    /* Sticky row labels (first column) */
    .clst-table th.clst-rowlabel, .clst-table td.clst-rowlabel {
      position: sticky; left: 0; z-index: 5;
      background: var(--surface-2);
      text-align: left; font-weight: 700;
      font-size: 9.5px; text-transform: uppercase; letter-spacing: .04em;
      color: var(--text-muted); min-width: 140px; max-width: 140px;
      white-space: normal; line-height: 1.3;
    }
    .clst-table td.clst-rowlabel { background: var(--surface); color: var(--text-sub); }

    /* Sticky header row */
    .clst-table thead th { position: sticky; top: 0; z-index: 6; }
    .clst-table thead th.clst-rowlabel { z-index: 7; }

    /* Doca group header */
    .clst-doca-header {
      font-size: 9.5px; font-weight: 800; color: var(--orange);
      background: rgba(238,77,45,.08);
    }
    .clst-rua-header {
      font-size: 8.5px; font-weight: 700; color: var(--text-muted);
      background: var(--surface-3); min-width: 42px;
    }

    /* Occupation heatmap cells */
    .clst-occ-free  { background: rgba(16,185,129,.18); }
    .clst-occ-busy  { background: rgba(239,68,68,.22); color: var(--text); font-weight: 700; }
    .clst-occ-mid   { background: rgba(245,158,11,.18); }
    [data-theme="dark"] .clst-occ-free { background: rgba(16,185,129,.14); }
    [data-theme="dark"] .clst-occ-busy { background: rgba(239,68,68,.20); }

    /* Aging cell colors */
    .clst-aging-hi  { background: rgba(239,68,68,.15); color: #f87171; font-weight: 700; }
    .clst-aging-mid { background: rgba(245,158,11,.12); color: #fbbf24; }
    .clst-aging-lo  { color: var(--text-sub); }

    /* Section title row in table */
    .clst-section-row td {
      background: var(--surface-3);
      font-size: 9px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .08em; color: var(--orange);
      text-align: left; padding: 6px 8px;
      position: sticky; left: 0;
    }

    /* Status pill in cluster ideal column */
    .clst-status-bar { width: 3px; display: inline-block; height: 14px; margin-right: 4px; vertical-align: middle; border-radius: 2px; }
    .clst-status-bar.red { background: var(--red); }
    .clst-status-bar.green { background: #10b981; }

    /* Legend */
    .clst-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; font-size: 11px; color: var(--text-muted); }
    .clst-legend-item { display: flex; align-items: center; gap: 6px; }
    .clst-legend-swatch { width: 14px; height: 14px; border-radius: 3px; }

    @media(max-width:768px){
      .clst-summary-bar { grid-template-columns: repeat(2,1fr); }
    }

    /* ── BACKLOG ──────────────────────────────────────────────── */
    .bkl-tabs {
      display: flex; gap: 2px; margin-bottom: 24px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 4px; width: fit-content;
    }
    .bkl-tab {
      padding: 8px 20px; border-radius: var(--radius);
      font-size: 12px; font-weight: 700; color: var(--text-muted);
      cursor: pointer; transition: all var(--transition);
      letter-spacing: .04em;
    }
    .bkl-tab.active { background: var(--orange); color: #fff; box-shadow: 0 2px 10px rgba(238,77,45,.35); }
    .bkl-tab:not(.active):hover { background: var(--surface-2); color: var(--text); }

    .bkl-panel { display: none; }
    .bkl-panel.active { display: block; }

    /* Profile cards grid */
    .bkl-profiles {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .bkl-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 14px;
      position: relative; overflow: hidden;
      transition: transform .18s, box-shadow .18s;
    }
    .bkl-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .bkl-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }
    .bkl-card.p::before  { background: var(--orange); }
    .bkl-card.m::before  { background: var(--cyan); }
    .bkl-card.g::before  { background: #10b981; }
    .bkl-card.bk::before { background: #a78bfa; }

    .bkl-card-icon { display: none; }

    .bkl-card-label {
      font-size: 9px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-muted); margin-bottom: 2px;
    }
    .bkl-card-name {
      font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 8px;
    }
    .bkl-card-value {
      font-size: 26px; font-weight: 800; color: var(--text); line-height: 1;
      margin-bottom: 3px;
    }
    .bkl-card.p  .bkl-card-value { color: var(--orange); }
    .bkl-card.m  .bkl-card-value { color: var(--cyan); }
    .bkl-card.g  .bkl-card-value { color: #10b981; }
    .bkl-card.bk .bkl-card-value { color: #a78bfa; }

    .bkl-card-unit { font-size: 10px; color: var(--text-muted); margin-bottom: 6px; }
    .bkl-card-delta {
      font-size: 10px; font-weight: 600;
      display: flex; align-items: center; gap: 3px;
      margin-bottom: 8px;
    }
    .bkl-card-delta.up   { color: #10b981; }
    .bkl-card-delta.down { color: var(--red); }

    .bkl-card-bar-bg {
      height: 4px; background: var(--surface-3); border-radius: 3px; overflow: hidden;
    }
    .bkl-card-bar-fill { height: 100%; border-radius: 3px; transition: width .5s; }
    .bkl-card.p  .bkl-card-bar-fill { background: var(--orange); }
    .bkl-card.m  .bkl-card-bar-fill { background: var(--cyan); }
    .bkl-card.g  .bkl-card-bar-fill { background: #10b981; }
    .bkl-card.bk .bkl-card-bar-fill { background: #a78bfa; }

    .bkl-card-meta {
      font-size: 9px; color: var(--text-muted); margin-top: 5px;
      display: flex; justify-content: space-between; flex-wrap: wrap; gap: 2px;
    }

    @media(max-width:1200px){ .bkl-profiles { grid-template-columns: repeat(3,1fr); } }
    @media(max-width:800px){ .bkl-profiles { grid-template-columns: repeat(2,1fr); } }

    /* Profile filter buttons */
    .bkl-pf-btn {
      padding: 5px 12px; border-radius: var(--radius);
      font-size: 11px; font-weight: 700; cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--surface-2); color: var(--text-muted);
      font-family: inherit; transition: all var(--transition);
      letter-spacing: .04em;
    }
    .bkl-pf-btn:hover { border-color: var(--orange); color: var(--orange); }
    .bkl-pf-btn.active { background: var(--orange); color: #fff; border-color: var(--orange); box-shadow: 0 2px 8px rgba(238,77,45,.3); }
    @media(max-width:600px){  .bkl-profiles { grid-template-columns: 1fr; }
      .bkl-tabs { flex-wrap: wrap; width: 100%; }
      .bkl-tab { flex: 1; text-align: center; }
    }
    /* ── GOVERNANÇA ──────────────────────────────────────────── */
    .gov-section { margin-bottom: 32px; }
    .gov-section-title {
      font-size: 15px; font-weight: 800; color: var(--text);
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px; padding-bottom: 10px;
      border-bottom: 2px solid var(--orange);
    }
    .gov-section-title .gov-num {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--orange); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; flex-shrink: 0;
    }

    /* Sub-items a) b) */
    .gov-sub-list { display: flex; flex-direction: column; gap: 10px; margin-left: 16px; }
    .gov-sub-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 16px 20px;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .gov-sub-letter {
      width: 24px; height: 24px; border-radius: var(--radius);
      background: rgba(238,77,45,.1); color: var(--orange);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; flex-shrink: 0;
    }
    .gov-sub-content { flex: 1; }
    .gov-sub-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .gov-sub-desc { font-size: 12px; color: var(--text-muted); }

    /* Plano de comunicação */
    .com-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
      gap: 12px;
    }
    .com-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 16px;
      display: flex; flex-direction: column; gap: 6px;
      transition: border-color var(--transition), transform var(--transition);
    }
    .com-card:hover { border-color: var(--orange); transform: translateY(-2px); }
    .com-card-freq {
      font-size: 10px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .08em; color: var(--orange); margin-bottom: 2px;
    }
    .com-card-name { font-size: 13px; font-weight: 700; color: var(--text); }
    .com-card-desc { font-size: 11px; color: var(--text-muted); }

    /* Matriz de responsabilidade */
    .resp-table-wrap { overflow-x: auto; border-radius: var(--radius-lg); }
    .resp-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 700px; }
    .resp-table th {
      background: var(--surface-2); padding: 10px 14px;
      font-size: 10px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .06em; color: var(--text-muted);
      border-bottom: 1px solid var(--border); text-align: left;
    }
    .resp-table td {
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      color: var(--text); vertical-align: top;
    }
    .resp-table tr:last-child td { border-bottom: none; }
    .resp-table tr:hover td { background: var(--surface-2); }
    .resp-pill {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 50%;
      font-size: 10px; font-weight: 800;
    }
    .resp-pill.R { background: rgba(238,77,45,.15); color: var(--orange); }
    .resp-pill.A { background: rgba(16,185,129,.15); color: #10b981; }
    .resp-pill.C { background: rgba(6,182,212,.15); color: var(--cyan); }
    .resp-pill.I { background: rgba(148,151,176,.12); color: #9497b0; }
    .resp-legend { display: flex; gap: 16px; margin-top: 10px; font-size: 11px; color: var(--text-muted); flex-wrap: wrap; }
    .resp-legend-item { display: flex; align-items: center; gap: 6px; }

    /* Ferramentas */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
      gap: 16px;
    }
    .tool-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
      cursor: pointer; transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column; /* ← flex column to pin footer */
    }
    .tool-card:hover { border-color: var(--orange); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(238,77,45,.15); }
    .tool-card-thumb {
      height: 110px;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
      border-bottom: 1px solid var(--border);
      overflow: hidden; position: relative; flex-shrink: 0;
    }
    /* Coloured thumbs per type */
    .tool-card-thumb.thumb-dashboard { background: linear-gradient(135deg,#1e3a5f 0%,#1e4d8c 100%); color: #60a5fa; }
    .tool-card-thumb.thumb-sheets    { background: linear-gradient(135deg,#064e3b 0%,#065f46 100%); color: #34d399; }
    .tool-card-thumb.thumb-web       { background: linear-gradient(135deg,#3d2a00 0%,#78450a 100%); color: #fbbf24; }
    .tool-card-thumb.thumb-default   { background: var(--surface-2); color: var(--text-muted); }
    .tool-card-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .tool-card-thumb .tool-icon { filter: drop-shadow(0 2px 6px rgba(0,0,0,.3)); }

    .tool-card-body {
      padding: 14px; flex: 1;
      display: flex; flex-direction: column;
    }
    .tool-card-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .tool-card-desc { font-size: 11px; color: var(--text-muted); flex: 1; } /* ← grows to push footer down */
    .tool-card-footer {
      margin-top: 12px; padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 6px;
    }
    .tool-card-owner {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; color: var(--text-muted);
    }
    .tool-card-link {
      font-size: 10px; color: var(--orange);
      display: flex; align-items: center; justify-content: space-between; gap: 4px;
    }

    /* Type badge colors: Dashboard=blue, Sheets=green, Web=yellow */
    .tool-card-thumb.thumb-ppt     { background: linear-gradient(135deg,#3d1a00 0%,#7c2d12 100%); color: #fb923c; }
    .type-badge-ppt { background:rgba(251,146,60,.15); color:#fb923c; }
    .type-badge-sheets    { background:rgba(16,185,129,.15);  color:#34d399; }
    .type-badge-web       { background:rgba(251,191,36,.15);  color:#fbbf24; }

    /* Guia de reuniões */
    .meetings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
      gap: 14px;
    }
    .meeting-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 18px; overflow: hidden;
      transition: border-color var(--transition);
    }
    .meeting-card:hover { border-color: var(--orange); }
    .meeting-card-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }
    .meeting-letter {
      width: 32px; height: 32px; border-radius: var(--radius);
      background: linear-gradient(135deg,var(--orange),#ff8c00);
      color: #fff; font-size: 13px; font-weight: 800;
